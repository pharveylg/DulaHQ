function openCardModal(type) {
  pauseForEvent();
  var m = null;
  for (var i = 0; i < S.groupMatches.length; i++) { if (S.groupMatches[i].id === S.currentMatchId) { m = S.groupMatches[i]; break; } }
  var ht = getTeamById(m.homeId), at = getTeamById(m.awayId);
  var isRed = type === 'red_direct';
  var body = '<div class="field"><label>Team</label><select id="ev-team" onchange="updatePlayerList()"><option value="' + m.homeId + '">' + (ht ? esc(ht.name) : 'Home') + '</option><option value="' + m.awayId + '">' + (at ? esc(at.name) : 'Away') + '</option></select></div>'
    + '<div class="field"><label>Player</label><select id="ev-player-sel">' + playerOpts(m.homeId) + '</select></div>'
    + (isRed ? '<div class="field"><label>Card type</label><select id="ev-redtype"><option value="red_direct">Direct red</option><option value="red_indirect">Indirect red</option><option value="red_yellow">Yellow + Red</option></select></div>' : '')
    + '<div class="field"><label>Minute</label><input type="number" id="ev-min" value="' + (elapsedMinute() || 1) + '" min="1" max="120"></div>';
  openModal(isRed ? '\ud83d\udfe5 Red Card' : '\ud83d\udfe8 Yellow Card', body, '<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="logCard(\'' + type + '\')"><i class="ti ti-check"></i> Log</button>');
}
function updatePlayerList() {
  var teamEl = el('ev-team');
  var tid = teamEl ? teamEl.value : null;
  var s2 = el('ev-player-sel');
  if (!s2 || !tid) return;
  s2.innerHTML = playerOpts(tid);
}
/* If a match has already been played and its events are edited afterward
   (post-game correction), keep the official score in sync with the event
   log and require re-verification \u2014 otherwise the displayed final score
   could silently drift from what the events list actually shows. */
function syncPlayedMatchAfterEventChange(m) {
  if (!m.played) return;
  var recomputed = getMatchScore(m);
  m.homeScore = recomputed.hs;
  m.awayScore = recomputed.as;
  m.verified = false;
}
/* Wipes every logged event (goals, cards, subs) for a match. This does NOT
   remove anything from the audit trail \u2014 past "Goal logged" / "Card
   logged" entries stay exactly where they are, and this action itself gets
   its own audit entry, so there's always a permanent record even though the
   event log on the match is now empty. */
function clearAllEvents(matchId) {
  var m = null;
  for (var i = 0; i < S.groupMatches.length; i++) { if (S.groupMatches[i].id === matchId) { m = S.groupMatches[i]; break; } }
  if (!m) return;
  if (!m.events || !m.events.length) return;
  var ht = getTeamById(m.homeId), at = getTeamById(m.awayId);
  openModal('Clear all events?', '<div class="alert alert-info" style="border-color:var(--rdb);background:var(--rdbg)"><i class="ti ti-alert-triangle" style="color:var(--red)"></i><span>This clears <b>ALL</b> logged events (goals, cards, substitutions) for ' + (ht ? esc(ht.name) : '?') + ' vs ' + (at ? esc(at.name) : '?') + '. This cannot be undone, though it will stay in the audit trail.</span></div>',
    '<button class="btn" onclick="closeModal()">Cancel</button><button class="btn danger" onclick="closeModal();confirmClearAllEvents(\'' + matchId + '\')"><i class="ti ti-trash"></i> Clear all</button>');
}
function confirmClearAllEvents(matchId) {
  var m = null;
  for (var i = 0; i < S.groupMatches.length; i++) { if (S.groupMatches[i].id === matchId) { m = S.groupMatches[i]; break; } }
  if (!m) return;
  var ht = getTeamById(m.homeId), at = getTeamById(m.awayId);
  var clearedCount = m.events.length;
  m.events = [];
  syncPlayedMatchAfterEventChange(m);
  logAudit('All events cleared', clearedCount + ' event(s) removed \u2014 ' + (ht ? ht.name : '?') + ' vs ' + (at ? at.name : '?'), m.id);
  render();
  showToast('Events cleared');
}

/* ---------------- TICKLER UPLOADS (referee's notebook photos) ---------------- */
function ticklerCardHtml(m) {
  var ticklers = m.ticklers || [];
  var html = '<div class="card"><div class="card-title"><i class="ti ti-camera"></i> Match notes / ticklers (' + ticklers.length + ')</div>';
  if (ticklers.length) {
    for (var i = 0; i < ticklers.length; i++) {
      var t = ticklers[i];
      html += '<div class="trow"><div><div class="tgl-label">' + esc(t.note || 'Notebook photo') + '</div><div class="tgl-sub">' + esc(t.fileName) + ' \u00b7 ' + esc(t.uploadedBy || 'Referee') + ' \u00b7 ' + new Date(t.uploadedAt).toLocaleString() + '</div></div>'
        + '<div style="display:flex;gap:6px;flex-shrink:0">'
        + '<button class="btn sm" onclick="viewTickler(\'' + m.id + '\',\'' + t.id + '\')" title="View"><i class="ti ti-eye"></i></button>'
        + '<button class="btn sm danger" onclick="deleteTickler(\'' + m.id + '\',\'' + t.id + '\')" title="Delete"><i class="ti ti-trash"></i></button>'
        + '</div></div>';
    }
  } else {
    html += '<div style="font-size:14px;color:var(--tm)">No notebook photos uploaded yet. Use the Tickler Upload tile to attach a photo of your match notes.</div>';
  }
  html += '</div>';
  return html;
}
function openTicklerUpload(matchId) {
  openModal('Tickler Upload', '<div style="font-size:14px;color:var(--tm);margin-bottom:12px">Attach a photo of your notebook or written match notes. Useful as a backup record of goals, cards, and timings taken during the game.</div>'
    + '<div class="field"><label>Note <span style="color:var(--tm);font-weight:400">(optional)</span></label><input id="m-tickler-note" placeholder="e.g. First half notes"></div>'
    + '<input type="file" id="m-tickler-file" style="display:none" accept="image/*" capture="environment" onchange="handleTicklerFile(this)">'
    + '<button class="btn" onclick="document.getElementById(\'m-tickler-file\').click()"><i class="ti ti-camera"></i> Take / choose photo</button>'
    + '<div id="m-tickler-filename" style="font-size:13px;color:var(--tm);margin-top:6px"></div>',
    '<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="submitTicklerUpload(\'' + matchId + '\')"><i class="ti ti-check"></i> Upload</button>');
}
function handleTicklerFile(inputEl) {
  var file = inputEl.files && inputEl.files[0];
  var fnEl = el('m-tickler-filename');
  if (file && fnEl) fnEl.textContent = file.name + ' (' + Math.round(file.size / 1024) + ' KB)';
}
function submitTicklerUpload(matchId) {
  var m = null;
  for (var i = 0; i < S.groupMatches.length; i++) { if (S.groupMatches[i].id === matchId) { m = S.groupMatches[i]; break; } }
  if (!m) return;
  var fileEl = el('m-tickler-file');
  var file = fileEl.files && fileEl.files[0];
  if (!file) { showToast('Choose or take a photo first'); return; }
  var note = (el('m-tickler-note').value || '').trim();
  if (!m.ticklers) m.ticklers = [];
  var ref = S.activeRefereeId ? getRefereeById(S.activeRefereeId) : null;
  var entry = {
    id: 'tick_' + uid(),
    note: note,
    fileName: file.name,
    fileData: '',
    mimeType: file.type || 'image/jpeg',
    uploadedAt: new Date().toISOString(),
    uploadedBy: (ref && ref.name) || (AUTH && AUTH.name) || 'Referee'
  };
  var finish = function () {
    m.ticklers.push(entry);
    var ht = getTeamById(m.homeId), at = getTeamById(m.awayId);
    logAudit('Tickler uploaded', (ht ? ht.name : '?') + ' vs ' + (at ? at.name : '?') + (note ? (' \u2014 ' + note) : ''), m.id);
    closeModal();
    render();
    showToast('Notebook photo uploaded');
  };
  if (typeof FileReader !== 'undefined' && file.size <= 8 * 1024 * 1024) {
    var reader = new FileReader();
    reader.onload = function (ev) { entry.fileData = ev.target.result; finish(); };
    reader.onerror = function () { finish(); };
    reader.readAsDataURL(file);
  } else { finish(); }
}
function findTickler(matchId, ticklerId) {
  for (var i = 0; i < S.groupMatches.length; i++) {
    if (S.groupMatches[i].id !== matchId) continue;
    var list = S.groupMatches[i].ticklers || [];
    for (var j = 0; j < list.length; j++) { if (list[j].id === ticklerId) return { match: S.groupMatches[i], tickler: list[j] }; }
  }
  return null;
}
function viewTickler(matchId, ticklerId) {

function adjustScore(side, delta) {

/* Quick score nudge for a LIVE match from the Officials table (admin / official

  return html;
}
function buildSecOptions() {

  var html = '';

  var sec = secEl ? parseInt(secEl.value) || 0 : 0;
  S.timerSeconds = min * 60 + sec;
  S.timerStarted = true;
  logAudit('Timer adjusted', 'Set to ' + String(min).padStart(2, '0') + ':' + String(sec).padStart(2, '0') + ' remaining', S.currentMatchId);

function wheelAdjust(ev, selectEl) {
  ev.preventDefault();
  var dir = ev.deltaY > 0 ? -1 : 1;
  var idx = selectEl.selectedIndex;
  var newIdx = idx - dir;
  if (newIdx < 0) newIdx = 0;
  if (newIdx >= selectEl.options.length) newIdx = selectEl.options.length - 1;
  selectEl.selectedIndex = newIdx;
  setTimerFromSelects();
}
function toggleTimer() {
  if (S.timerRunning) { clearInterval(S.timerInterval); S.timerRunning = false; }
  else {
    S.timerRunning = true;
    S.timerStarted = true;
    S.onBreak = null;
    S.timerInterval = setInterval(function () {
      S.timerSeconds--;
      var disp = Math.max(S.timerSeconds, 0);
      var minEl = el('timer-min-select');
      var secEl = el('timer-sec-select');
      if (minEl) minEl.value = Math.floor(disp / 60);
      if (secEl) secEl.value = disp % 60;
      updateInjuryTimeUI();
    }, 1000);
  }
  render();
}

/* Pause the clock for an in-play break (half-time or hydration) and log it */
function takeBreak(kind, label) {
  if (S.timerRunning) { clearInterval(S.timerInterval); S.timerRunning = false; }
  S.onBreak = kind;
  logAudit(label, label + ' started at ' + elapsedMinute() + '\'', S.currentMatchId);
  showToast(label + ' \u2014 timer paused');
  render();
}
function halfTimeBreak() { takeBreak('halftime', 'Half-time'); }
function hydrationBreak() { takeBreak('hydration', 'Hydration break'); }
function timerStatusLabel() {
  if (S.timerRunning) return 'Running';
  if (S.onBreak === 'halftime') return 'Half-Time';
  if (S.onBreak === 'hydration') return 'Hydration break';
  return 'Paused';
}
/* Start / Pause / Resume \u2014 distinguishes "never started" from
   "paused partway through" so the button reads correctly either way. */
function timerButtonLabel() {
  if (S.timerRunning) return 'Pause';
  if (S.timerStarted) return 'Resume';
  return 'Start';
}
/* Logging any in-play event can pause the clock \u2014 the referee is asked,
   rather than it happening silently \u2014 except Default/DQ, which is an
   administrative match-ending action rather than an in-play event. */
function pauseForEvent() {
  if (!S.timerRunning) return;
  if (confirm('Pause the match timer for this event?')) {
    clearInterval(S.timerInterval);
    S.timerRunning = false;
  }
}

/* Timer now counts DOWN from the match duration. S.timerSeconds holds the
   seconds REMAINING (can go negative once regulation time is up, which is
   how injury/stoppage time is tracked). elapsedMinute() converts that back
   to "minute of the match" for event timestamps and audit logging. */
/* The timer is only ever "live" for one match at a time (S.timerSeconds /
   timerRunning / timerStarted), but a referee can switch between matches
   on the selector dropdown. Whenever the match being viewed changes, save
   the outgoing match's timer state onto the match object itself, and load
   (or freshly initialize) the incoming match's state \u2014 otherwise a match
   that was never started would incorrectly inherit "Resume" from whatever
   match was last being timed. */
function syncTimerToCurrentMatch() {
  if (S.timerMatchId === S.currentMatchId) return;
  if (S.timerMatchId) {
    var outgoing = null;
    for (var i = 0; i < S.groupMatches.length; i++) { if (S.groupMatches[i].id === S.timerMatchId) { outgoing = S.groupMatches[i]; break; } }
    if (outgoing) { outgoing.timerRemaining = S.timerSeconds; outgoing.timerStarted = S.timerStarted; }
  }
  if (S.timerRunning) { clearInterval(S.timerInterval); S.timerRunning = false; }
  var incoming = null;
  for (var j = 0; j < S.groupMatches.length; j++) { if (S.groupMatches[j].id === S.currentMatchId) { incoming = S.groupMatches[j]; break; } }
  if (incoming && incoming.timerStarted) {
    S.timerSeconds = (typeof incoming.timerRemaining === 'number') ? incoming.timerRemaining : (S.tournament.duration || 60) * 60;
    S.timerStarted = true;
  } else {
    S.timerSeconds = (S.tournament.duration || 60) * 60;
    S.timerStarted = false;
  }
  S.timerMatchId = S.currentMatchId;
}
function elapsedMinute() {
  var regulation = (S.tournament.duration || 60) * 60;
  return Math.floor((regulation - S.timerSeconds) / 60);
}
function isInjuryTime() { return S.timerSeconds <= 0; }
function injuryMinutes() {
  if (S.timerSeconds > 0) return 0;
  return Math.floor(-S.timerSeconds / 60) + 1;
}
function updateInjuryTimeUI() {

    mins[i].style.borderColor = inInjury ? 'var(--rdb)' : 'var(--nb)';

}
function resetTimer() {
  var m = null;
  for (var i = 0; i < S.groupMatches.length; i++) { if (S.groupMatches[i].id === S.currentMatchId) { m = S.groupMatches[i]; break; } }
  var ht = m ? getTeamById(m.homeId) : null, at = m ? getTeamById(m.awayId) : null;

    '<button class="btn" onclick="closeModal()">Cancel</button><button class="btn danger" onclick="closeModal();confirmResetTimer(\'' + (m ? m.id : '') + '\')"><i class="ti ti-rotate"></i> Reset everything</button>');
}
function confirmResetTimer(matchId) {
  var m = null;
  if (matchId) { for (var i = 0; i < S.groupMatches.length; i++) { if (S.groupMatches[i].id === matchId) { m = S.groupMatches[i]; break; } } }
  clearInterval(S.timerInterval);
  S.timerSeconds = (S.tournament.duration || 60) * 60;
  S.timerRunning = false;

  if (m) {

/* ---------------- SHEETS SYNC ---------------- */
function apiUrlBuild(action, extra) {
  var base = SCRIPT_URL + '?action=' + action + '&email=' + encodeURIComponent(AUTH.email);
  if (extra) base = base + extra;
  return base;
}
function apiFetch(action, extra, callback) {
  if (!SCRIPT_URL) { callback(null, 'SCRIPT_URL not configured'); return; }
  var url = apiUrlBuild(action, extra);
  fetch(url)
    .then(function (r) { return r.json(); })
    .then(function (d) { callback(d, null); })
    .catch(function (e) { callback(null, e.message); });
}
/* Saving goes via POST with the state in the request body, not a GET query
   string \u2014 a full tournament's state (plus any uploaded document/tickler
   photos) can easily run into the tens of thousands of characters, which
   silently fails or gets truncated as a URL. Apps Script Web Apps accept
   POST bodies with no such practical limit. */
function apiPost(action, payload, callback) {
  if (!SCRIPT_URL) { callback(null, 'SCRIPT_URL not configured'); return; }
  var url = SCRIPT_URL + '?action=' + action + '&email=' + encodeURIComponent(AUTH.email);
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids a CORS preflight against Apps Script
    body: JSON.stringify(payload)
  })
    .then(function (r) { return r.json(); })
    .then(function (d) { callback(d, null); })
    .catch(function (e) { callback(null, e.message); });
}
function autoSave() {
  if (AUTH.signedIn && SCRIPT_URL && (AUTH.role === 'admin' || AUTH.role === 'referee' || AUTH.role === 'official')) {
    pushToSheetsQuiet();
  }
}
function pushToSheetsQuiet() {
  var stripped = JSON.parse(JSON.stringify(S));
  stripped.timerInterval = null;
  apiPost('saveState', stripped, function (res, err) {
    if (err || !res || !res.ok) { /* silent fail for auto-save */ }
  });
}
function loadFromSheets() {
  if (!AUTH.signedIn) { showToast('Sign in first'); return; }
  openModal('Refresh from backend?', '<div class="alert alert-info"><i class="ti ti-alert-triangle" style="color:var(--amber)"></i><span>This replaces everything currently on screen with the last saved version from the backend. Any changes you\u2019ve made since your last Save will be lost.</span></div>',
    '<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="closeModal();confirmLoadFromSheets()"><i class="ti ti-cloud-download"></i> Refresh</button>');
}
function confirmLoadFromSheets() {
  showToast('Refreshing\u2026');
  apiFetch('getState', '', function (res, err) {
    if (err || !res || !res.ok) { showToast('Refresh failed: ' + (err || (res && res.error) || 'unknown error')); return; }

    renderNav(); render(); showToast('Refreshed!');

}
function pushToSheets() {

    showToast('Saved to Sheets!');

}

function renderAccessRequests() {
  var pending = 0;
  for (var i = 0; i < S.accessRequests.length; i++) { if (S.accessRequests[i].status === 'pending') pending++; }
  setTopbar('Access Requests', pending + ' pending review');
  if (!S.accessRequests.length) { el('main-content').innerHTML = '<div class="empty"><i class="ti ti-user-plus"></i><p>No access requests yet.</p></div>'; return; }
  var order = { pending: 0, approved: 1, rejected: 2 };
  var sorted = S.accessRequests.slice().sort(function (a, b) { return order[a.status] - order[b.status]; });
  var html = '';
  for (var s = 0; s < sorted.length; s++) {
    var r = sorted[s];
    var statusBadge = r.status === 'pending' ? '<span class="badge bamb">Pending</span>' : (r.status === 'approved' ? '<span class="badge bg">Approved</span>' : '<span class="badge brd">Rejected</span>');
    html += '<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
      + '<div><div style="font-weight:600">' + esc(r.name) + '</div><div style="font-size:13px;color:var(--tm)">' + esc(r.email) + (r.phone ? (' \u00b7 ' + esc(r.phone)) : '') + ' \u00b7 Requesting: ' + esc(REQUEST_ACCESS_ROLES[r.role] || r.role) + '</div></div>'
      + statusBadge + '</div>'
      + (r.notes ? ('<div style="font-size:14px;color:var(--tm);margin-bottom:8px">' + esc(r.notes) + '</div>') : '')
      + (r.status === 'pending' ? ('<div style="display:flex;gap:8px"><button class="btn primary sm" onclick="approveAccessRequest(\'' + r.id + '\')"><i class="ti ti-check"></i> Approve</button><button class="btn sm danger" onclick="rejectAccessRequest(\'' + r.id + '\')"><i class="ti ti-x"></i> Reject</button></div>')
        : (r.status === 'rejected' && r.rejectReason ? ('<div style="font-size:13px;color:var(--red)">Reason: ' + esc(r.rejectReason) + '</div>') : ''))
      + '</div>';

  el('main-content').innerHTML = html;

function approveAccessRequest(id) {
  var r = null;
  for (var i = 0; i < S.accessRequests.length; i++) { if (S.accessRequests[i].id === id) { r = S.accessRequests[i]; break; } }

  render();

function rejectAccessRequest(id) {

function handleCredentialResponse(response) {
  var jwt = response.credential;

  AUTH.email = email;

    if (err || !res || !res.ok) {

      if (errEl) {
        errEl.textContent = (res && res.error) ? res.error : 'Connection error. Please try again.';

/* ---------------- DEMO SEED (local, no backend needed) ---------------- */
/* Builds a smaller, self-contained demo category (teams, groups, fixtures,
   some played results) without disturbing whatever category is currently
   active. Used by seedDemo() so the category selector has more than one
   real option \u2014 otherwise Audience has nothing to actually pick between.
   Re-seeding replaces any prior demo category of the same name rather than
   duplicating it. */
/* Builds a knockout bracket for a category from whatever its current group
   standings show \u2014 works even if the group stage isn't 100% finished
   (unlike buildKnockout(), which requires full completion). This lets a demo
   category have a real, viewable bracket while still leaving a match or two
   open for the referee-assignment demo above. First round is simulated as
   played; later rounds are left pending, same style as the main category. */
function seedKnockoutForCategory(cat) {
  var savedActive = S.activeCategoryId;
  S.activeCategoryId = cat.id;
  var advancers = getAdvancers();
  if (advancers.length >= 2) {
    var current = [];
    for (var ci = 0; ci < advancers.length; ci += 2) {
      if (advancers[ci + 1]) current.push({ id: uid(), p1: advancers[ci], p2: advancers[ci + 1], s1: null, s2: null, played: false, winner: null, ps1: null, ps2: null, events: [] });
    }
    function rn(n) { return n === 1 ? 'Final' : (n === 2 ? 'Semi-finals' : (n === 4 ? 'Quarter-finals' : ('Round of ' + (n * 2)))); }
    var rounds = [{ name: rn(current.length), matches: current }];
    for (var i = 0; i < current.length; i++) {
      current[i].s1 = 2; current[i].s2 = (i % 2 === 0) ? 0 : 1;
      current[i].played = true;
      current[i].winner = { id: current[i].p1.id };
    }
    var prev = current;
    while (prev.length > 1) {
      var next = [];
      for (var ni = 0; ni < prev.length; ni += 2) { next.push({ id: uid(), p1: null, p2: null, s1: null, s2: null, played: false, winner: null, from: [ni, ni + 1], events: [] }); }
      rounds.push({ name: rn(next.length), matches: next });
      prev = next;
    }
    S.knockoutRounds = rounds;
    propagateKnockout();
  }
  S.activeCategoryId = savedActive;
}

  }

  var shuffled = newCat.teams.slice();
  for (var sh = shuffled.length - 1; sh > 0; sh--) { var rj = Math.floor(Math.random() * (sh + 1)); var tmp = shuffled[sh]; shuffled[sh] = shuffled[rj]; shuffled[rj] = tmp; }
  for (var gi = 0; gi < numGroups; gi++) {

  }

  S.activeCategoryId = savedActiveId;
}
