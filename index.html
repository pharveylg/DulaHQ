<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dula HQ — Tournament Manager</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#faf9f5;--n2:#ffffff;--n3:#f7f3ea;--n4:#efe6cd;
  --nb:#e6dcc2;--nbl:#f0e8d4;
  --gold:#c8960a;--gl:rgba(200,150,10,.10);--gb:rgba(200,150,10,.35);
  --text:#1a1a1a;--ts:#3f4750;--tm:#9aa0a8;
  --navacc:#15803d;--navaccl:rgba(21,128,61,.10);--navaccb:rgba(21,128,61,.35);
  --green:#16a34a;--grbg:rgba(22,163,74,.08);--grb:rgba(22,163,74,.25);
  --red:#dc2626;--rdbg:rgba(220,38,38,.08);--rdb:rgba(220,38,38,.25);
  --amber:#d97706;--ambg:rgba(217,119,6,.08);--amb:rgba(217,119,6,.25);
  --blue:#2563eb;--blbg:rgba(37,99,235,.08);--blb:rgba(37,99,235,.25);
  --purple:#7c3aed;--purbg:rgba(124,58,237,.08);--purb:rgba(124,58,237,.25);
  --r:8px;--sb:220px;--sbr:230px;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--navy);color:var(--text);font-size:16px;line-height:1.5;min-height:100vh;overflow-x:hidden}
.shell{display:flex;min-height:100vh}
.sidebar{width:var(--sb);background:var(--n2);border-right:1px solid var(--nb);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .25s}
.main{margin-left:var(--sb);margin-right:var(--sbr);flex:1;display:flex;flex-direction:column;min-height:100vh}
.sidebar-manage-block{position:fixed;right:0;top:0;width:var(--sbr);height:100vh;background:var(--n2);border-left:1px solid var(--nb);padding:16px 14px;overflow-y:auto;z-index:90;display:flex;flex-direction:column;gap:10px}
.topbar{padding:14px 20px;border-bottom:2px solid var(--navaccb);display:flex;align-items:center;justify-content:space-between;background:var(--n2);position:sticky;top:0;z-index:50}
.content{flex:1;padding:20px;max-width:1300px}
.logo-row{padding:16px 14px 12px;border-bottom:1px solid var(--nbl);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--gold);border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon i{color:#0f1b2d;font-size:20px}
.logo-text{font-size:18px;font-weight:600;flex:1}
.logo-sub{font-size:13px;color:var(--tm);margin-top:1px}
.role-box{padding:10px 12px;border-bottom:1px solid var(--nbl)}
.sec-label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--tm);font-weight:500;margin-bottom:6px}
.sec-label-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.sec-label-toggle i{font-size:13px}
.sec-current{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border-radius:var(--r);border:1px solid var(--nb);background:var(--n3);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;text-align:left;margin-bottom:6px}
.sec-current:hover{background:var(--n4)}
.sec-options{display:flex;flex-direction:column;gap:2px;margin-bottom:6px}
.role-pill{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);font-size:14px;cursor:pointer;color:var(--ts);border:none;background:transparent;width:100%;text-align:left;transition:all .15s;font-family:inherit;margin-bottom:2px}
.role-pill:hover{background:var(--n3);color:var(--text)}
.role-pill.active{background:var(--navaccl);color:var(--navacc);border:1px solid var(--navaccb);font-weight:500}
.role-pill i{font-size:16px;width:16px}
.nav-box{padding:10px 12px;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);font-size:15px;cursor:pointer;color:var(--ts);border:none;background:transparent;width:100%;text-align:left;transition:all .15s;font-family:inherit;margin-bottom:2px}
.nav-item:hover{background:var(--n3);color:var(--text)}
.nav-item.active{background:var(--navaccl);color:var(--navacc);font-weight:500}
.nav-item.active i{color:var(--navacc)}
.nav-item i{font-size:18px;width:17px}
.nav-badge{margin-left:auto;background:var(--gl);color:var(--gold);font-size:12px;padding:1px 6px;border-radius:10px;border:1px solid var(--gb);font-weight:500}
.sb-footer{padding:12px;border-top:1px solid var(--nbl);margin-top:auto}
.trn-card{background:var(--navaccl);border:1px solid var(--navaccb);border-radius:var(--r);padding:10px 12px}
.manual-chip{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:20px;border:1px solid var(--nb);background:var(--n3);font-size:14px;font-weight:500;cursor:grab;user-select:none}
.manual-chip:active{cursor:grabbing}
.manual-chip.selected{border-color:var(--navacc);background:var(--navaccl);color:var(--navacc)}
.manual-chip i{font-size:14px;color:var(--tm)}
.manual-dropzone{min-height:60px;cursor:pointer;transition:background .1s,border-color .1s}
.manual-dropzone:hover{border-color:var(--navaccb)}
.manual-slot{flex:1;display:flex;align-items:center;justify-content:center;border:1px dashed var(--nb);border-radius:var(--r);padding:8px 10px}
.manual-slot-filled{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:6px;background:var(--n3);margin-bottom:4px;font-size:14px}
.manual-slot-filled button,.manual-slot button{background:transparent;border:none;color:var(--tm);cursor:pointer;padding:2px;display:flex}
.manual-slot-filled button:hover,.manual-slot button:hover{color:var(--red)}
.manual-placeholder{font-size:12px;color:var(--tm);padding:8px 0}
.trn-name{font-size:14px;font-weight:600;color:var(--navacc)}
.trn-meta{font-size:13px;color:var(--tm);margin-top:3px}
.card{background:var(--n2);border:1px solid var(--nb);border-radius:10px;padding:16px;margin-bottom:12px;overflow-x:auto}
.card-title{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;margin-bottom:14px}
.card-title i{color:var(--gold);font-size:18px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat-tile{background:var(--n3);border:1px solid var(--nb);border-radius:var(--r);padding:14px 16px}
.stat-n{font-size:29px;font-weight:600;line-height:1.1}
.stat-n.gd{color:var(--gold)}
.stat-l{font-size:13px;color:var(--tm);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.field{margin-bottom:10px}
.field label{display:block;font-size:13px;color:var(--ts);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;background:var(--n3);border:1px solid var(--nb);border-radius:var(--r);color:var(--text);font-size:15px;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold)}
.field select option{background:var(--n3)}
.btn{padding:7px 14px;border-radius:var(--r);border:1px solid var(--nb);background:var(--n3);color:var(--ts);font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;transition:all .15s;font-weight:500}
.btn:hover{color:var(--text);background:var(--n4)}
.btn.primary{background:var(--navaccl);color:var(--navacc);border-color:var(--navaccb);font-weight:600}
.btn.primary:hover{opacity:.9}
.btn.danger{background:var(--rdbg);color:var(--red);border-color:var(--rdb)}
.btn.sm{padding:4px 10px;font-size:13px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap}
.bg{background:var(--gl);color:var(--gold);border:1px solid var(--gb)}
.bgr{background:var(--grbg);color:var(--green);border:1px solid var(--grb)}
.brd{background:var(--rdbg);color:var(--red);border:1px solid var(--rdb)}
.bamb{background:var(--ambg);color:var(--amber);border:1px solid var(--amb)}
.bbl{background:var(--blbg);color:var(--blue);border:1px solid var(--blb)}
.bgy{background:var(--n3);color:var(--ts);border:1px solid var(--nb)}
.bpur{background:var(--purbg);color:var(--purple);border:1px solid var(--purb)}
.trow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--nbl)}
.trow:last-child{border-bottom:none}
.tgl-label{font-size:15px;font-weight:500}
.tgl-sub{font-size:13px;color:var(--tm);margin-top:2px}
.tgl{width:38px;height:21px;background:var(--nb);border-radius:11px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--gold)}
.tgl::after{content:'';position:absolute;width:15px;height:15px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s}
.tgl.on::after{left:20px}
.empty{text-align:center;padding:40px 20px;color:var(--tm)}
.empty i{font-size:38px;display:block;margin-bottom:10px;opacity:.5}
.empty p{font-size:15px}
.alert{padding:10px 12px;border-radius:var(--r);font-size:14px;display:flex;gap:8px;align-items:flex-start;line-height:1.5;margin-bottom:10px}
.alert-info{background:var(--gl);color:var(--gold);border:1px solid var(--gb)}
.alert-warn{background:var(--ambg);color:var(--amber);border:1px solid var(--amb)}
.alert-err{background:var(--rdbg);color:var(--red);border:1px solid var(--rdb)}
.tb-title{font-size:18px;font-weight:600}
.tb-sub{font-size:14px;color:var(--ts);margin-top:2px}
.tb-actions{display:flex;gap:8px;align-items:center}
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{text-align:left;padding:6px 8px;color:var(--tm);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--nb)}
.tbl td{padding:8px;border-bottom:1px solid var(--nbl);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl td.num,.tbl th.num{text-align:center}
.p-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--nbl)}
.org-tier{display:flex;justify-content:center;flex-wrap:wrap;gap:14px;position:relative}
.org-connector{width:2px;height:22px;background:var(--nb);margin:0 auto}
.org-node{background:var(--n3);border:1px solid var(--nb);border-radius:10px;padding:12px 16px;min-width:140px;max-width:180px;text-align:center}
.org-tier-label{text-align:center;font-size:12px;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.team-link{cursor:pointer}
.team-link:hover{text-decoration:underline;color:var(--gold)}
.p-row:last-child{border-bottom:none}
.ava{width:32px;height:32px;border-radius:50%;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--gold);flex-shrink:0;border:1px solid var(--gb)}
.p-info{flex:1;min-width:0}
.p-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-sub{font-size:13px;color:var(--tm)}
.mc{background:var(--n2);border:1px solid var(--nb);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.mc-hd{padding:8px 14px;background:var(--n3);border-bottom:1px solid var(--nbl);display:flex;align-items:center;justify-content:space-between}
.mc-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;padding:12px 14px}
.mc-team{font-size:15px;font-weight:600}
.mc-team.r{text-align:right}
.mc-score{background:var(--n3);border:1px solid var(--nb);border-radius:6px;padding:5px 14px;text-align:center;font-size:22px;font-weight:700;color:var(--gold);min-width:76px}
.expand-btn{width:100%;padding:7px;background:transparent;border:none;border-top:1px solid var(--nbl);color:var(--tm);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.mc-expand{display:none;padding:10px 14px 12px}
.mc-expand.open{display:block}
.ev-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:14px;color:var(--ts)}
.ev-min{color:var(--gold);font-weight:600;min-width:26px;text-align:right;font-size:13px}
.ev-i i{font-size:15px}
.ev-goal i{color:var(--gold)}
.ev-yel i{color:var(--amber)}
.ev-red i{color:var(--red)}
.ev-sub i{color:var(--blue)}
.ev-pen i{color:var(--purple)}
.fmt-opt{padding:12px;border-radius:var(--r);text-align:center;cursor:pointer;border:1px solid var(--nb);background:var(--n3)}
.fmt-opt.sel{background:var(--gl);border-color:var(--gb)}
.fmt-label{font-size:15px;font-weight:600;color:var(--ts);margin-top:6px}
.fmt-opt.sel .fmt-label{color:var(--gold)}
.fmt-sub{font-size:13px;color:var(--tm);margin-top:2px}
.struct-opt{padding:10px 12px;border-radius:var(--r);cursor:pointer;border:1px solid var(--nb);background:var(--n3);text-align:left}
.struct-opt.sel{background:var(--gl);border-color:var(--gb)}
.tb-list-panel{display:none;padding-top:8px}
.tb-list-panel.open{display:block}
.tb-item{display:flex;gap:8px;padding:7px 10px;border-radius:var(--r);margin-bottom:4px;background:var(--n3);border:1px solid var(--nbl);align-items:flex-start}
.tb-rank{width:18px;height:18px;border-radius:50%;background:var(--gl);border:1px solid var(--gb);color:var(--gold);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ref-board{background:var(--n3);border:1px solid var(--nb);border-radius:var(--r);padding:16px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-bottom:12px}
.ref-tname{font-size:15px;font-weight:600;text-align:center}
.ref-trole{font-size:12px;color:var(--tm);text-align:center;margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.ref-score{font-size:38px;font-weight:700;color:var(--gold);text-align:center}
.timer-n{font-size:34px;font-weight:700;color:var(--gold);text-align:center;padding:4px 0}
.timer-s{font-size:13px;color:var(--tm);text-align:center;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.act-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.act-btn{padding:10px 6px;border-radius:var(--r);border:1px solid var(--nb);background:var(--n3);color:var(--ts);font-size:13px;cursor:pointer;text-align:center;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:5px;font-weight:500}
.act-btn i{font-size:24px}
.ab-goal i{color:var(--gold)}
.ab-yel i{color:var(--amber)}
.ab-red i{color:var(--red)}
.ab-sub i{color:var(--blue)}
.ab-pen i{color:var(--purple)}
.ab-dq i{color:var(--tm)}
.ab-hyd i{color:var(--blue)}
.ab-half i{color:var(--purple)}
.ab-tickler i{color:var(--tm)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-overlay.hidden{display:none}
.modal{background:var(--n2);border:1px solid var(--nb);border-radius:12px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--nbl);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:18px;font-weight:600}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--nbl);display:flex;gap:8px;justify-content:flex-end}
.mob-topbar{display:none;padding:12px 16px;background:var(--n2);border-bottom:1px solid var(--nb);align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.mob-menu-btn{background:transparent;border:none;color:var(--ts);cursor:pointer;padding:4px;font-size:24px}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--n2);border-top:1px solid var(--nb);z-index:100;padding:6px 0}
.mob-nav-inner{display:flex;justify-content:space-around}
.mob-tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;color:var(--tm);font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;font-family:inherit}
.mob-tab i{font-size:24px}
.mob-tab.active{color:var(--gold)}
.progress-bar{height:6px;background:var(--n3);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:var(--gold);border-radius:3px}
.ko-round-title{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--tm);font-weight:500;margin-bottom:8px}
.trophy-card{text-align:center;padding:24px;background:var(--gl);border:1px solid var(--gb);border-radius:10px;margin-bottom:16px}
.trophy-icon{font-size:44px;color:var(--gold);display:block;margin-bottom:8px}
.trophy-winner{font-size:26px;font-weight:600;color:var(--gold)}
.trophy-sub{font-size:14px;color:var(--ts);margin-top:4px}
.sb-overlay{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,.4)}
.sb-overlay.show{display:block}
.view-toggle{display:flex;gap:6px;margin-bottom:14px;padding:4px;background:var(--n3);border-radius:var(--r);border:1px solid var(--nb);width:fit-content}
.vt-btn{padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--ts);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
.vt-btn.active{background:var(--gold);color:#0f1b2d}
.pip{font-size:12px;padding:2px 6px;border-radius:10px;font-weight:600;border:1px solid}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;margin-right:0}
  .topbar{display:none}
  .mob-topbar{display:flex}
  .mob-nav{display:block}
  .content{padding:14px;padding-bottom:80px}
  .g4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr}
  .g2{grid-template-columns:1fr}
  .sidebar-manage-block{position:static;width:100%;height:auto;border-left:none;border-top:1px solid var(--nbl);padding:10px 12px 0;overflow-y:visible;z-index:auto}
}
</style>
</head>
<body>

/* ============================================================
   CATEGORY HELPERS
   All feature functions read/write through these accessors
   instead of S.teams / S.groups / etc. directly.
   ============================================================ */

function makeCategoryId() { return 'cat_' + uid(); }

function defaultCategory() {
  return {
    id: makeCategoryId(),
    name: 'General',
    ageGroup: 'Open',
    format: '7',
    duration: 60,
    structure: 'groups_knockout',
    numGroups: 2,
    advancePer: 2,
    ptsWin: 3,
    ptsDraw: 1,
    offside: false,
    extraTime: true,
    penalties: true,
    hasHalftime: true,
    customLabel: '',
    seeding: 'random',
    thirdPlace: false,
    teams: [],
    groups: [],
    groupMatches: [],
    knockoutRounds: [],
    generated: false,
    bracketView: 'chart'
  };
}

/* Create the first category on initial boot.
   (S.tournament / S.teams / S.groups etc. are themselves proxies onto the
   active category — see CATEGORY PROXY LAYER below — so this must NOT read
   from them, or it would recurse into itself.) */
function migrateLegacyData() {
  if (S.categories && S.categories.length > 0) return; // already migrated
  var cat = defaultCategory();
  S.categories = [cat];
  S.activeCategoryId = cat.id;
}

/* Return the active category object */
function activeCategory() {
  migrateLegacyData();
  if (!S.activeCategoryId && S.categories.length) S.activeCategoryId = S.categories[0].id;
  for (var i = 0; i < S.categories.length; i++) {
    if (S.categories[i].id === S.activeCategoryId) return S.categories[i];
  }
  // fallback: create one
  var c = defaultCategory();
  S.categories.push(c);
  S.activeCategoryId = c.id;
  return c;
}

function getCategoryById(id) {
  for (var i = 0; i < S.categories.length; i++) { if (S.categories[i].id === id) return S.categories[i]; }
  return null;
}

function setActiveCategory(id) {
  S.activeCategoryId = id;
  S.viewAllCategories = false;
  var cat = activeCategory();
  S.currentMatchId = null;
  UI_EXPAND.category = false;
  renderNav();
  render();
}

/* Shorthand accessors that mirror the old S.teams etc. */
function AC_teams()         { return activeCategory().teams; }
function AC_groups()        { return activeCategory().groups; }
function AC_groupMatches()  { return activeCategory().groupMatches; }
function AC_knockoutRounds(){ return activeCategory().knockoutRounds; }
function AC_generated()     { return activeCategory().generated; }

/* ============================================================
   CATEGORY PROXY LAYER
   The rest of this app (setup, groups, bracket, standings,
   schedule, officials, referee, seed-demo) was written against
   flat S.teams / S.groups / S.groupMatches / S.knockoutRounds /
   S.generated / S.tournament.* fields. Rather than rewrite every
   one of those call sites, these fields are redefined as
   accessor properties that transparently read/write the active
   category, so every existing function now operates per-category
   with zero changes elsewhere.
   ============================================================ */
S._tournamentMeta = { name: 'Dula HQ Tournament', venue: '', date: '', pitches: [] };

function defineCategoryProxy(prop, catField) {
  Object.defineProperty(S, prop, {
    get: function () { return activeCategory()[catField]; },
    set: function (v) { activeCategory()[catField] = v; },
    configurable: true,
    enumerable: true
  });
}
defineCategoryProxy('teams', 'teams');
defineCategoryProxy('groups', 'groups');
defineCategoryProxy('groupMatches', 'groupMatches');
defineCategoryProxy('knockoutRounds', 'knockoutRounds');
defineCategoryProxy('generated', 'generated');
defineCategoryProxy('bracketView', 'bracketView');

function buildTournamentView() {
  var cat = activeCategory();
  var meta = S._tournamentMeta;
  var view = {};
  function bindMeta(key) {
    Object.defineProperty(view, key, {
      get: function () { return meta[key]; },
      set: function (v) { meta[key] = v; },
      enumerable: true
    });
  }
  function bindCat(key) {
    Object.defineProperty(view, key, {
      get: function () { return cat[key]; },
      set: function (v) { cat[key] = v; },
      enumerable: true
    });
  }
  bindMeta('name'); bindMeta('venue'); bindMeta('date');
  Object.defineProperty(view, 'pitches', {
    get: function () { if (!meta.pitches) meta.pitches = []; return meta.pitches; },
    set: function (v) { meta.pitches = v; },
    enumerable: true
  });
  Object.defineProperty(view, 'ageCategory', {
    get: function () { return cat.ageGroup; },
    set: function (v) { cat.ageGroup = v; },
    enumerable: true
  });
  bindCat('format'); bindCat('duration'); bindCat('structure');
  bindCat('numGroups'); bindCat('advancePer'); bindCat('ptsWin'); bindCat('ptsDraw');
  bindCat('offside'); bindCat('extraTime'); bindCat('penalties'); bindCat('hasHalftime');
  bindCat('customLabel'); bindCat('seeding'); bindCat('thirdPlace');
  return view;
}
Object.defineProperty(S, 'tournament', {
  get: buildTournamentView,
  set: function (obj) {
    // Wholesale reassignment (e.g. S.tournament = {...}) — write each
    // field through the view's own setters so it still lands in the
    // right place (shared meta vs. active category).
    var view = buildTournamentView();
    for (var k in obj) { if (obj.hasOwnProperty(k)) view[k] = obj[k]; }
  },
  configurable: true,
  enumerable: true
});

/* getTeamById now searches active category */
function getTeamById(id) {
  var teams = AC_teams();
  for (var i = 0; i < teams.length; i++) { if (teams[i].id === id) return teams[i]; }
  return null;
}

/* Convert any <i class="ti ti-xxx"></i> markup already in template strings
   into inline SVGs after render, so existing icon class names keep working. */
function hydrateIcons(root) {
  var nodes = root.querySelectorAll('i.ti');
  for (var i = 0; i < nodes.length; i++) {
    var node = nodes[i];
    var cls = node.className || '';
    var m = cls.match(/ti-([a-z0-9-]+)/);
    if (!m) continue;
    var name = m[1];
    var computed = (typeof window !== 'undefined' && window.getComputedStyle) ? window.getComputedStyle(node) : null;
    var sizeMatch = (node.getAttribute('style') || '').match(/font-size:\s*(\d+)px/);
    var size = sizeMatch ? parseInt(sizeMatch[1]) : (computed ? (parseInt(computed.fontSize) || 16) : 16);
    var colorMatch = (node.getAttribute('style') || '').match(/color:\s*([^;]+)/);
    // Some icons (e.g. sidebar nav items, active-state icons) only get their
    // color from a CSS class rule like ".nav-item.active i{color:gold}" —
    // not an inline style. Fall back to the resolved computed color so
    // that class-driven highlighting survives the swap to <svg>.
    var color = colorMatch ? colorMatch[1] : (computed ? computed.color : null);
    var wrap = document.createElement('span');
    wrap.innerHTML = svgIcon(name, size, color);
    var svgEl = wrap.firstChild;
    if (svgEl) node.parentNode.replaceChild(svgEl, node);
  }
}

  return out || '?';
}

/* Shared helper for CSV template downloads and any other client-side
   text-file download (Blob + object URL, revoked after the click). */
function downloadTextFile(content, filename, mime) {
  var blob = new Blob([content], { type: mime || 'text/plain' });

/* Reads a CSV/XLSX file the person picked, via SheetJS (already loaded for
   exports), and hands the parsed rows to onRows(rows). Works for both a
   real .xlsx and a plain .csv \u2014 SheetJS auto-detects the format. */
function readSpreadsheetFile(input, onRows) {
  var file = input.files && input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function (e) {
    try {
      var wb = XLSX.read(e.target.result, { type: 'binary' });
      var sheet = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
      onRows(rows);
    } catch (err) {
      showToast('Could not read that file \u2014 make sure it\'s a CSV or Excel file.');
    }
  };
  reader.readAsBinaryString(file);
  input.value = '';
}
/* Case/spacing-tolerant column lookup, since people rename or reorder
   spreadsheet headers all the time. Tries each candidate key as-is, then
   falls back to a normalized (lowercase, no spaces) comparison. */
function csvField(row, candidates) {
  for (var i = 0; i < candidates.length; i++) {
    if (row[candidates[i]] !== undefined && row[candidates[i]] !== '') return String(row[candidates[i]]).trim();
  }
  var norm = {};
  for (var k in row) { norm[k.toLowerCase().replace(/[^a-z0-9]/g, '')] = row[k]; }
  for (var j = 0; j < candidates.length; j++) {
    var key = candidates[j].toLowerCase().replace(/[^a-z0-9]/g, '');
    if (norm[key] !== undefined && norm[key] !== '') return String(norm[key]).trim();
  }
  return '';
}
function esc(s) {
  s = String(s || '');
  s = s.split('&').join('&amp;');
  s = s.split('<').join('&lt;');
  s = s.split('>').join('&gt;');
  s = s.split('"').join('&quot;');
  return s;
}

/* ============================================================
   EXPORTS (CSV / Excel / PDF) \u2014 all generated client-side via
   jsPDF + jspdf-autotable + SheetJS (loaded from CDN in <head>).
   Every export shares one branded header block (tournament name,
   report title, who/when generated, filters applied) and logs to
   the audit trail, same as any other tracked action in the app.
   ============================================================ */
function csvEscape(v) {
  v = (v === null || v === undefined) ? '' : String(v);
  if (v.indexOf(',') >= 0 || v.indexOf('"') >= 0 || v.indexOf('\n') >= 0) { v = '"' + v.replace(/"/g, '""') + '"'; }
  return v;
}
function downloadBlob(blob, filename) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
}
function buildExportMeta(title, filtersText) {
  var who = (AUTH && AUTH.signedIn && (AUTH.name || AUTH.email)) || (S.role.charAt(0).toUpperCase() + S.role.slice(1));
  return {
    tournament: (S.tournament && S.tournament.name) || 'Dula HQ Tournament',
    title: title,
    generatedBy: who,
    generatedAt: new Date().toLocaleString(),
    filters: filtersText || ''
  };
}
function exportToCSV(filename, headers, rows, meta) {
  var lines = [];
  if (meta) {
    lines.push(csvEscape(meta.tournament));
    lines.push(csvEscape(meta.title));
    lines.push(csvEscape('Generated: ' + meta.generatedAt + ' by ' + meta.generatedBy));
    if (meta.filters) lines.push(csvEscape('Filters: ' + meta.filters));
    lines.push('');
  }
  lines.push(headers.map(csvEscape).join(','));
  for (var i = 0; i < rows.length; i++) { lines.push(rows[i].map(csvEscape).join(',')); }
  var blob = new Blob([lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  downloadBlob(blob, filename + '.csv');
  logAudit('Report exported', meta.title + ' \u2014 CSV', null);
  showToast('CSV downloaded');
}
function exportToExcel(filename, headers, rows, meta) {
  if (typeof XLSX === 'undefined') { showToast('Excel export library did not load \u2014 check your connection'); return; }
  var wsData = [];
  if (meta) {
    wsData.push([meta.tournament]);
    wsData.push([meta.title]);
    wsData.push(['Generated: ' + meta.generatedAt + ' by ' + meta.generatedBy]);
    if (meta.filters) wsData.push(['Filters: ' + meta.filters]);
    wsData.push([]);
  }
  wsData.push(headers);
  for (var i = 0; i < rows.length; i++) { wsData.push(rows[i]); }
  var ws = XLSX.utils.aoa_to_sheet(wsData);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Report');
  XLSX.writeFile(wb, filename + '.xlsx');
  logAudit('Report exported', meta.title + ' \u2014 Excel', null);
  showToast('Excel file downloaded');
}
function exportToPDF(filename, headers, rows, meta) {
  if (typeof window.jspdf === 'undefined') { showToast('PDF export library did not load \u2014 check your connection'); return; }
  var doc = new window.jspdf.jsPDF();
  var y = 14;
  doc.setFontSize(14); doc.text(meta.tournament, 14, y); y += 7;
  doc.setFontSize(11); doc.text(meta.title, 14, y); y += 6;
  doc.setFontSize(9); doc.setTextColor(120);
  doc.text('Generated: ' + meta.generatedAt + ' by ' + meta.generatedBy, 14, y); y += 5;
  if (meta.filters) { doc.text('Filters: ' + meta.filters, 14, y); y += 5; }
  doc.setTextColor(0);
  doc.autoTable({
    head: [headers],
    body: rows,
    startY: y + 3,
    styles: { fontSize: 8 },
    headStyles: { fillColor: [200, 150, 10] }
  });
  var pageCount = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pageCount; p++) {
    doc.setPage(p);
    doc.setFontSize(8); doc.setTextColor(150);
    doc.text('Page ' + p + ' of ' + pageCount + ' \u00b7 Dula HQ Tournament Manager', 14, doc.internal.pageSize.getHeight() - 8);
  }
  doc.save(filename + '.pdf');
  logAudit('Report exported', meta.title + ' \u2014 PDF', null);
  showToast('PDF downloaded');
}

function buildStandingsExportData() {
  var cat = activeCategory();
  var all = [];
  for (var gi = 0; gi < S.groups.length; gi++) {
    var grp = S.groups[gi];
    var standings = calcGroupStandings(gi);
    for (var idx = 0; idx < standings.length; idx++) {
      var s = standings[idx];
      var copy = {}; for (var key in s) copy[key] = s[key];
      copy.grpName = grp.name;
      all.push(copy);
    }
  }
  all.sort(function (a, b) { if (b.pts !== a.pts) return b.pts - a.pts; return (b.gf - b.ga) - (a.gf - a.ga); });
  var headers = ['#', 'Team', 'Group', 'MP', 'Pts', 'GD', 'GF'];
  var rows = [];
  for (var i = 0; i < all.length; i++) {
    var s2 = all[i];
    var tm = getTeamById(s2.id);
    rows.push([i + 1, tm ? tm.name : '?', s2.grpName, s2.mp, s2.pts, s2.gf - s2.ga, s2.gf]);
  }
  return { headers: headers, rows: rows, meta: buildExportMeta('Standings', cat.name) };
}
function buildScheduleExportData() {

function buildTeamDashExportData() {
  var tm = getTeamById(S.activeTeamId);

  var stats = computeTeamStats(tm);
  var headers = ['Result', 'Opponent', 'Score', 'Verified'];
  var rows = [];
  for (var i = 0; i < stats.prev.length; i++) {

function doExport(reportKey, format) {
  var data = null;
  if (reportKey === 'standings') data = buildStandingsExportData();
  else if (reportKey === 'schedule') data = buildScheduleExportData();
  else if (reportKey === 'officials') data = buildOfficialsExportData();
  else if (reportKey === 'teamdash') data = buildTeamDashExportData();
  else if (reportKey === 'teamprofile') data = buildTeamProfileExportData();
  if (!data) { showToast('Nothing to export yet'); return; }
  var filename = (data.meta.title || reportKey).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
  if (format === 'csv') exportToCSV(filename, data.headers, data.rows, data.meta);
  else if (format === 'xlsx') exportToExcel(filename, data.headers, data.rows, data.meta);
  else if (format === 'pdf') exportToPDF(filename, data.headers, data.rows, data.meta);
}

}

/* ---------------- SETUP ---------------- */

      + '</div>';
  } else {

function selFmt(f, elem) {
  S.tournament.format = f;
  var opts = document.querySelectorAll('.fmt-opt');
  for (var i = 0; i < opts.length; i++) {
    opts[i].classList.remove('sel');
    var ico = opts[i].querySelector('.ti-ball-football');
    if (ico) ico.style.color = 'var(--ts)';
    var subEl = opts[i].querySelector('.fmt-sub');
    var lbl = opts[i].querySelector('.fmt-label');
    if (subEl && lbl) {
      var txt = lbl.textContent;
      subEl.textContent = txt.indexOf('11') >= 0 ? 'Full match' : (txt.indexOf('8') >= 0 ? '8 outfield + GK' : '7 players');
    }
  }
  elem.classList.add('sel');
  var ico2 = elem.querySelector('.ti-ball-football');
  if (ico2) ico2.style.color = 'var(--gold)';
  elem.querySelector('.fmt-sub').textContent = 'Selected';
}

function selStructure(k, elem) {
  S.tournament.structure = k;
  var opts = document.querySelectorAll('.struct-opt');
  for (var i = 0; i < opts.length; i++) { opts[i].classList.remove('sel'); }
  elem.classList.add('sel');
  renderStructureDetail();
}

function renderStructureDetail() {
  var t = S.tournament;
  var k = t.structure || 'groups_knockout';
  var ed = el('struct-detail');
  if (!ed) return;
  var html = '';
  if (k === 'groups_knockout') {
    var go = '';
    var ng = [1, 2, 4, 8];
    for (var a = 0; a < ng.length; a++) { go += '<option value="' + ng[a] + '"' + ((t.numGroups || 2) === ng[a] ? ' selected' : '') + '>' + ng[a] + ' group' + (ng[a] > 1 ? 's' : '') + '</option>'; }
    var ao = '';
    var na = [1, 2, 3, 4];
    for (var b = 0; b < na.length; b++) { ao += '<option value="' + na[b] + '"' + ((t.advancePer || 2) === na[b] ? ' selected' : '') + '>' + na[b] + ' team' + (na[b] > 1 ? 's' : '') + '</option>'; }
    html = '<div class="g2"><div class="field"><label>Number of groups</label><select id="inp-ngroups">' + go + '</select></div>'
      + '<div class="field"><label>Teams advancing per group</label><select id="inp-advper">' + ao + '</select></div></div>'
      + '<div class="alert alert-info" style="margin-top:4px"><i class="ti ti-info-circle"></i><span>Group matches and knockout bracket generated automatically.</span></div>';
  } else if (k === 'knockout') {
    html = '<div class="g2"><div class="field"><label>Seeding</label><select id="inp-seed"><option value="random">Random draw</option><option value="manual">Manual seeding</option></select></div>'
      + '<div class="field"><label>3rd place play-off</label><select id="inp-3rd"><option value="no">No</option><option value="yes">Yes</option></select></div></div>'
      + '<div class="alert alert-info" style="margin-top:4px"><i class="ti ti-info-circle"></i><span>All teams enter the knockout bracket directly.</span></div>';
  } else if (k === 'round_robin' || k === 'double_round_robin') {
    html = '<div class="g2"><div class="field"><label>Points for a win</label><input type="number" id="inp-pts-win" value="' + (t.ptsWin || 3) + '" min="1" max="5" style="width:80px"></div>'
      + '<div class="field"><label>Points for a draw</label><input type="number" id="inp-pts-draw" value="' + (t.ptsDraw || 1) + '" min="0" max="3" style="width:80px"></div></div>'
      + '<div class="alert alert-info" style="margin-top:4px"><i class="ti ti-info-circle"></i><span>' + (k === 'round_robin' ? 'Each team plays every other team once.' : 'Each team plays every other team home and away.') + '</span></div>';
  } else if (k === 'custom') {
    html = '<div class="alert alert-warn"><i class="ti ti-alert-triangle"></i><span>Custom mode: go to Groups to manually add and score matches.</span></div>'
      + '<div style="margin-top:10px"><div class="field"><label>Label (optional)</label><input id="inp-custom-label" value="' + esc(t.customLabel || '') + '" placeholder="e.g. League Phase"></div></div>';
  }
  ed.innerHTML = html;
}

function toggleTb() {
  var li = el('tb-list');
  var ic = el('tb-icon');
  var open = li.classList.toggle('open');
  ic.className = open ? 'ti ti-chevron-up' : 'ti ti-chevron-down';
}
function addPitch() {
  if (!S.tournament.pitches) S.tournament.pitches = [];
  S.tournament.pitches.push({ name: 'Pitch ' + (S.tournament.pitches.length + 1) });
  renderSetup();
}
function removePitch(i) { S.tournament.pitches.splice(i, 1); renderSetup(); }
function updatePitchName(i, v) { if (S.tournament.pitches) S.tournament.pitches[i].name = v; }

function saveSetup() {
  var t = S.tournament;
  t.name = el('inp-name').value.trim() || 'Dula HQ Tournament';
  t.venue = el('inp-venue').value.trim();
  t.date = el('inp-date').value;
  t.ageCategory = el('inp-age').value;
  t.duration = parseInt(el('inp-dur').value) || 60;
  t.offside = el('tgl-offside').classList.contains('on');
  t.extraTime = el('tgl-et').classList.contains('on');
  t.penalties = el('tgl-pen').classList.contains('on');
  t.hasHalftime = el('tgl-half').classList.contains('on');
  var k = t.structure || 'groups_knockout';
  if (k === 'groups_knockout') {
    var ngEl = el('inp-ngroups');
    var apEl = el('inp-advper');
    t.numGroups = ngEl ? (parseInt(ngEl.value) || 2) : 2;
    t.advancePer = apEl ? (parseInt(apEl.value) || 2) : 2;
  }
  if (k === 'round_robin' || k === 'double_round_robin') {
    var pwEl = el('inp-pts-win');
    var pdEl = el('inp-pts-draw');
    t.ptsWin = pwEl ? (parseInt(pwEl.value) || 3) : 3;
    t.ptsDraw = pdEl ? (parseInt(pdEl.value) || 1) : 1;
  }
  if (k === 'knockout') {
    var seedEl = el('inp-seed');
    var thirdEl = el('inp-3rd');
    t.seeding = seedEl ? seedEl.value : 'random';
    t.thirdPlace = thirdEl ? (thirdEl.value === 'yes') : false;
  }
  if (k === 'custom') {
    var clEl = el('inp-custom-label');
    t.customLabel = clEl ? clEl.value : '';
  }
  renderNav();
  render();
  showToast('Settings saved');
}

/* ---------------- CATEGORIES ---------------- */
function kpiTile_(label, value, icon, color, onclick) {
  return '<div class="card" style="text-align:center;padding:14px 10px' + (onclick ? ';cursor:pointer' : '') + '"' + (onclick ? (' onclick="' + onclick + '"') : '') + '><i class="ti ' + icon + '" style="font-size:24px;color:' + (color || 'var(--gold)') + '"></i><div style="font-size:26px;font-weight:700;margin-top:6px' + (color ? (';color:' + color) : '') + '">' + value + '</div><div style="font-size:13px;color:var(--tm);margin-top:2px">' + esc(label) + '</div></div>';
}
function dashTile_(label, icon, onclick, badge) {
  return '<div class="card" style="text-align:center;padding:16px 10px;cursor:pointer;position:relative" onclick="' + onclick + '">'
    + (badge ? ('<span class="nav-badge" style="position:absolute;top:8px;right:8px">' + badge + '</span>') : '')
    + '<i class="ti ' + icon + '" style="font-size:26px;color:var(--gold)"></i>'
    + '<div style="font-size:14px;font-weight:600;margin-top:8px">' + esc(label) + '</div>'
    + '</div>';
}
function renderAdminDashboard() {
  setTopbar('Dashboard', 'Tournament overview');
  var totalTeams = 0, totalMatches = 0, liveMatches = 0;
  for (var i = 0; i < S.categories.length; i++) {
    var c = S.categories[i];
    totalTeams += c.teams.length;
    totalMatches += c.groupMatches.length;
    for (var j = 0; j < c.groupMatches.length; j++) { if (c.groupMatches[j].inProgress) liveMatches++; }
  }
  var pendingReg = 0; for (var r1 = 0; r1 < S.registrations.length; r1++) { if (S.registrations[r1].status === 'pending') pendingReg++; }
  var pendingAccess = 0; for (var r2 = 0; r2 < S.accessRequests.length; r2++) { if (S.accessRequests[r2].status === 'pending') pendingAccess++; }
  var allDocs = getAllDocumentUploads();
  var pendingDocs = 0; for (var r3 = 0; r3 < allDocs.length; r3++) { if (allDocs[r3].doc.status === 'pending') pendingDocs++; }
  var totalPending = pendingReg + pendingAccess + pendingDocs;
  // "Pending reviews" combines three separate queues \u2014 jump to whichever
  // actually has something waiting, rather than always landing on the same one
  var pendingTarget = pendingReg ? 'registrations' : (pendingAccess ? 'accessrequests' : (pendingDocs ? 'documentreviews' : 'registrations'));

  var html = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:22px">'
    + kpiTile_('Categories', S.categories.length, 'ti-layout-grid', null, "navTo('categories')")
    + kpiTile_('Teams', totalTeams, 'ti-users-group', null, "navTo('teams')")
    + kpiTile_('Live now', liveMatches, 'ti-player-play', liveMatches ? 'var(--red)' : null, "navTo('officials')")
    + kpiTile_('Pending reviews', totalPending, 'ti-alert-triangle', totalPending ? 'var(--amber)' : null, "navTo('" + pendingTarget + "')")
    + '</div>';

  html += '<div class="sec-label" style="margin-bottom:8px">View as</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:22px">'
    + dashTile_('Team Manager', 'ti-users', "switchRole('team')")
    + dashTile_('Referee', 'ti-whistle', "switchRole('referee')")
    + dashTile_('Tournament Committee', 'ti-shield-check', "switchRole('official')")
    + dashTile_('Guest', 'ti-trophy', "switchRole('audience')")
    + '</div>';

/* ---- Conflict prevention: same team / referee / pitch at the same kickoff time, tournament-wide ---- */
function findMatchConflicts(mid, proposed) {
  // proposed: { kickoff, pitchName, refereeId } — only checked fields that are non-empty
  var all = getAllScheduledMatches();
  var target = null;
  for (var i = 0; i < all.length; i++) { if (all[i].match.id === mid) { target = all[i]; break; } }
  if (!target) return [];
  var kickoff = (proposed && proposed.kickoff !== undefined) ? proposed.kickoff : target.match.kickoff;
  if (!kickoff) return []; // no kickoff time set yet — nothing to conflict on
  var pitchName = (proposed && proposed.pitchName !== undefined) ? proposed.pitchName : target.match.pitchName;
  var refereeId = (proposed && proposed.refereeId !== undefined) ? proposed.refereeId : target.match.refereeId;
  var conflicts = [];
  for (var j = 0; j < all.length; j++) {
    var other = all[j].match;
    if (other.id === mid) continue;
    if (other.played || !other.kickoff || other.kickoff !== kickoff) continue;
    if (other.homeId === target.match.homeId || other.homeId === target.match.awayId || other.awayId === target.match.homeId || other.awayId === target.match.awayId) {
      var oh = getTeamById(other.homeId), oa = getTeamById(other.awayId);
      conflicts.push('Team clash: a team in this match is already scheduled at ' + kickoff + ' (' + (oh ? oh.name : '?') + ' v ' + (oa ? oa.name : '?') + ')');
    }
    if (pitchName && other.pitchName === pitchName) {
      conflicts.push('Pitch clash: ' + pitchName + ' is already booked at ' + kickoff);
    }
    if (refereeId && other.refereeId === refereeId) {
      var refc = getRefereeById(refereeId);
      conflicts.push('Referee clash: ' + (refc ? refc.name : 'this referee') + ' is already assigned at ' + kickoff);
    }
  }
  return conflicts;
}
function assignReferee(mid, refId) {
  var conflicts = findMatchConflicts(mid, { refereeId: refId || null });
  if (refId && conflicts.length) {
    showToast(conflicts[0]);
    render();
    return;
  }
  for (var i = 0; i < S.groupMatches.length; i++) { if (S.groupMatches[i].id === mid) { S.groupMatches[i].refereeId = refId || null; break; } }
  var m = null;
  for (var j = 0; j < S.groupMatches.length; j++) { if (S.groupMatches[j].id === mid) { m = S.groupMatches[j]; break; } }
  var refr = refId ? getRefereeById(refId) : null;
  var ht = m ? getTeamById(m.homeId) : null, at = m ? getTeamById(m.awayId) : null;
  logAudit('Referee assigned', (refr ? refr.name : 'Unassigned') + ' \u2014 ' + (ht ? ht.name : '?') + ' v ' + (at ? at.name : '?'), mid);
  render();
}

/* ---- Self-assign: a referee claims one of their own unassigned matches ---- */
function claimMatch(mid) {
  if (!S.activeRefereeId) { showToast('Pick which referee you are first'); return; }
  var conflicts = findMatchConflicts(mid, { refereeId: S.activeRefereeId });
  if (conflicts.length) { showToast(conflicts[0]); return; }
  var m = null;
  for (var i = 0; i < S.groupMatches.length; i++) { if (S.groupMatches[i].id === mid) { m = S.groupMatches[i]; break; } }
  if (!m) return;
  if (m.refereeId) { showToast('Already claimed by another referee'); render(); return; }
  m.refereeId = S.activeRefereeId;
  var refr = getRefereeById(S.activeRefereeId);
  var ht = getTeamById(m.homeId), at = getTeamById(m.awayId);
  logAudit('Match self-assigned', (refr ? refr.name : '?') + ' claimed ' + (ht ? ht.name : '?') + ' v ' + (at ? at.name : '?'), mid);
  showToast('Match claimed');
  render();
}
function releaseMatch(mid) {
  var m = null;
  for (var i = 0; i < S.groupMatches.length; i++) { if (S.groupMatches[i].id === mid) { m = S.groupMatches[i]; break; } }
  if (!m) return;
  m.refereeId = null;
  logAudit('Match released', 'Referee released assignment', mid);
  render();
}
function setActiveReferee(id) { S.activeRefereeId = id || null; renderNav(); render(); }

/* ---------------- OFFICIATING TEAM (broader committee roster) ----------------
   The Referees page above handles referees specifically, wired into match
   assignment/self-assign/conflict-checking. This page is the wider Tournament
   Committee directory \u2014 referees plus every other designated role that
   supports officiating (assistant referees, fourth officials, commissioners,
   timekeepers, etc.) that don't need per-match assignment. Managed by Admin
   and the Tournament Committee (official) role. Tournament-wide, not scoped
   to a single category, since committee members typically serve across the
   whole event. */
var OFFICIATING_DESIGNATIONS = ['Referee', 'Assistant Referee', 'Fourth Official', 'Match Commissioner', 'Timekeeper', 'Video Assistant Referee (VAR)', 'Medical Officer', 'Security Officer', 'Other'];
/* Suggested hierarchy level per designation \u2014 1 is the top of the org
   chart (Match Commissioner). Editable per member, so a custom "Other"
   role (or any role) can be placed anywhere in the hierarchy. */
var DESIGNATION_DEFAULT_LEVEL = { 'Match Commissioner': 1, 'Referee': 2, 'Fourth Official': 2, 'Assistant Referee': 3, 'Video Assistant Referee (VAR)': 3, 'Timekeeper': 4, 'Medical Officer': 4, 'Security Officer': 4, 'Other': 5 };
function defaultLevelForDesignation(d) { return DESIGNATION_DEFAULT_LEVEL[d] || 5; }
function defaultOfficiatingMember() { return { id: 'com_' + uid(), name: '', phone: '', email: '', designation: 'Referee', designationOther: '', orgLevel: defaultLevelForDesignation('Referee'), notes: '', linkedRefereeId: null }; }
function getOfficiatingMemberById(id) {
  for (var i = 0; i < S.officiatingTeam.length; i++) { if (S.officiatingTeam[i].id === id) return S.officiatingTeam[i]; }
  return null;
}
function designationLabel(m) { return m.designation === 'Other' ? (m.designationOther || 'Other') : m.designation; }
function renderOfficiatingTeam() {
  var canManage = (S.role === 'admin' || S.role === 'official');
  setTopbar('Officiating Team', S.officiatingTeam.length + ' member' + (S.officiatingTeam.length === 1 ? '' : 's') + ' \u00b7 org chart', canManage ? ('<div style="display:flex;gap:6px;flex-wrap:wrap">'
    + '<button class="btn sm" onclick="downloadOfficiatingTemplate()"><i class="ti ti-download"></i> CSV template</button>'
    + '<input type="file" id="officiating-csv" accept=".csv,.xlsx,.xls" style="display:none" onchange="handleOfficiatingCsvUpload(this)">'
    + '<button class="btn sm" onclick="document.getElementById(\'officiating-csv\').click()"><i class="ti ti-upload"></i> Import CSV</button>'
    + '<button class="btn primary" onclick="openAddOfficiatingMember()"><i class="ti ti-plus"></i> Add member</button>'
    + '</div>') : '');
  if (!S.officiatingTeam.length) { el('main-content').innerHTML = '<div class="empty"><i class="ti ti-shield-check"></i><p>No officiating team members yet. Add referees, assistant referees, commissioners, timekeepers, and other designated roles here.</p></div>'; return; }
  var byLevel = {};
  var levels = [];
  for (var i = 0; i < S.officiatingTeam.length; i++) {
    var m = S.officiatingTeam[i];
    var lvl = m.orgLevel || defaultLevelForDesignation(m.designation);
    if (!byLevel[lvl]) { byLevel[lvl] = []; levels.push(lvl); }
    byLevel[lvl].push(m);
  }
  levels.sort(function (a, b) { return a - b; });
  var html = '<div class="card"><div class="card-title"><i class="ti ti-shield-check"></i> Officiating Team \u2014 Org Chart</div>';
  for (var li = 0; li < levels.length; li++) {
    var lvl2 = levels[li];
    var members = byLevel[lvl2];
    if (li > 0) html += '<div class="org-connector"></div>';
    html += '<div class="org-tier-label">Level ' + lvl2 + (lvl2 === 1 ? ' \u2014 Top' : '') + '</div><div class="org-tier">';
    for (var j = 0; j < members.length; j++) {
      var mm = members[j];
      html += '<div class="org-node"><div class="ava" style="margin:0 auto 6px">' + ini(mm.name) + '</div>'
        + '<div style="font-weight:600;font-size:14px">' + esc(mm.name || '(no name)') + '</div>'
        + '<div style="font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:.03em;margin-top:2px">' + esc(designationLabel(mm)) + '</div>'
        + (mm.phone ? ('<div style="font-size:12px;color:var(--tm);margin-top:4px">' + esc(mm.phone) + '</div>') : '')
        + (canManage ? ('<div style="display:flex;gap:4px;justify-content:center;margin-top:8px"><button class="btn sm" onclick="openEditOfficiatingMember(\'' + mm.id + '\')"><i class="ti ti-edit"></i></button><button class="btn sm danger" onclick="removeOfficiatingMember(\'' + mm.id + '\')"><i class="ti ti-trash"></i></button></div>') : '')
        + '</div>';
    }
    html += '</div>';
  }
  html += '</div>';
  el('main-content').innerHTML = html;
}
function officiatingFormFields(m) {
  var desigOpts = '';
  for (var i = 0; i < OFFICIATING_DESIGNATIONS.length; i++) { desigOpts += '<option value="' + esc(OFFICIATING_DESIGNATIONS[i]) + '"' + (m.designation === OFFICIATING_DESIGNATIONS[i] ? ' selected' : '') + '>' + esc(OFFICIATING_DESIGNATIONS[i]) + '</option>'; }

    + '<div class="field"><label>Org chart level <span style="color:var(--tm);font-weight:400">(1 = top, e.g. Commissioner)</span></label><input type="number" id="m-com-level" min="1" max="10" value="' + (m.orgLevel || defaultLevelForDesignation(m.designation)) + '"></div>'

function toggleComOther() {

function openAddOfficiatingMember() {

}
function readOfficiatingFormInto(m) {
  m.name = (el('m-com-name').value || '').trim();

/* Keep a Referee-designated committee member in sync with the dedicated
   S.referees roster, so they automatically show up in "Refereeing as" and
   the match-assignment dropdowns \u2014 without maintaining two separate
   referee identities by hand. */
function syncOfficiatingMemberReferee(m) {
  if (m.designation === 'Referee') {
    if (m.linkedRefereeId && getRefereeById(m.linkedRefereeId)) {
      var existing = getRefereeById(m.linkedRefereeId);
      existing.name = m.name;
      existing.phone = m.phone;
    } else {
      var r = defaultReferee();
      r.name = m.name;
      r.phone = m.phone;
      S.referees.push(r);
      m.linkedRefereeId = r.id;
    }
  } else if (m.linkedRefereeId) {
    removeRefereeSilently(m.linkedRefereeId);
    m.linkedRefereeId = null;
  }
}
function saveNewOfficiatingMember() {
  var m = defaultOfficiatingMember();
  readOfficiatingFormInto(m);
  if (!m.name) { showToast('Enter a name'); return; }
  S.officiatingTeam.push(m);
  syncOfficiatingMemberReferee(m);
  logAudit('Officiating team member added', m.name + ' \u2014 ' + designationLabel(m), null);
  closeModal();
  render();
  showToast('Added to officiating team' + (m.designation === 'Referee' ? ' \u2014 also added to the Referees roster' : ''));
}
function downloadOfficiatingTemplate() {
  var csv = 'Name,Phone,Email,Designation,Org Level,Notes\r\n'
    + 'Danilo Cruz,09171234567,danilo@example.com,Referee,3,\r\n'
    + 'Maria Reyes,09179876543,maria@example.com,Match Commissioner,1,Overall tournament lead\r\n';
  downloadTextFile(csv, 'officiating-team-template.csv', 'text/csv');
}
function handleOfficiatingCsvUpload(input) {
  readSpreadsheetFile(input, function (rows) {
    var added = 0, skipped = 0;
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var name = csvField(r, ['Name', 'Full Name']);
      if (!name) { skipped++; continue; }
      var m = defaultOfficiatingMember();
      m.name = name;
      m.phone = csvField(r, ['Phone']);
      m.email = csvField(r, ['Email']);
      var desigRaw = csvField(r, ['Designation', 'Role']);
      var matched = null;
      for (var d = 0; d < OFFICIATING_DESIGNATIONS.length; d++) { if (OFFICIATING_DESIGNATIONS[d].toLowerCase() === desigRaw.toLowerCase()) { matched = OFFICIATING_DESIGNATIONS[d]; break; } }
      m.designation = matched || 'Other';
      if (!matched && desigRaw) m.designationOther = desigRaw;
      var levelRaw = csvField(r, ['Org Level', 'OrgLevel', 'Level']);
      m.orgLevel = parseInt(levelRaw) || defaultLevelForDesignation(m.designation);
      m.notes = csvField(r, ['Notes']);
      S.officiatingTeam.push(m);
      syncOfficiatingMemberReferee(m);
      added++;
    }
    if (added) logAudit('Officiating team bulk import', added + ' member(s) imported via CSV', null);
    render();
    showToast(added + ' member' + (added === 1 ? '' : 's') + ' imported' + (skipped ? (', ' + skipped + ' row(s) skipped (no name)') : ''));
  });
}
function openEditOfficiatingMember(id) {
  var m = getOfficiatingMemberById(id);
  if (!m) return;
  openModal('Edit officiating team member', officiatingFormFields(m), '<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveEditOfficiatingMember(\'' + id + '\')"><i class="ti ti-check"></i> Save</button>');
}
function saveEditOfficiatingMember(id) {
  var m = getOfficiatingMemberById(id);
  if (!m) return;
  readOfficiatingFormInto(m);
  syncOfficiatingMemberReferee(m);
  logAudit('Officiating team member updated', m.name + ' \u2014 ' + designationLabel(m), null);
  closeModal();
  render();
  showToast('Updated');
}
function removeOfficiatingMember(id) {
  var m = getOfficiatingMemberById(id);
  if (!m) return;
  if (!confirm('Remove "' + m.name + '" from the officiating team?')) return;
  if (m.linkedRefereeId) { removeRefereeSilently(m.linkedRefereeId); }
  var out = [];
  for (var i = 0; i < S.officiatingTeam.length; i++) { if (S.officiatingTeam[i].id !== id) out.push(S.officiatingTeam[i]); }
  S.officiatingTeam = out;
  logAudit('Officiating team member removed', m.name, null);
  render();
  showToast('Removed');
}

function submitRegistration() {
  var d = ensureRegDraft();
  updateRegDraft();
  if (!d.categoryId) { showToast('Select a category'); return; }
  if (!d.teamName.trim()) { showToast('Enter a team name'); return; }
  if (!d.managerName.trim() || !d.managerEmail.trim()) { showToast('Enter the team manager\u2019s name and email'); return; }
  if (!d.players.length) { showToast('Add at least one player'); return; }
  d.submittedAt = new Date().toISOString();
  d.status = 'pending';
  S.registrations.push(d);
  logAudit('Team registration submitted', d.teamName + ' \u2014 ' + (getCategoryById(d.categoryId) ? getCategoryById(d.categoryId).name : ''), null);

function renderRegistrations() {
  var pending = 0;
  for (var i = 0; i < S.registrations.length; i++) { if (S.registrations[i].status === 'pending') pending++; }
  setTopbar('Registrations', pending + ' pending review');
  if (!S.registrations.length) { el('main-content').innerHTML = '<div class="empty"><i class="ti ti-user-plus"></i><p>No team registrations submitted yet.</p></div>'; return; }
  var order = { pending: 0, approved: 1, rejected: 2 };
  var sorted = S.registrations.slice().sort(function (a, b) { return order[a.status] - order[b.status]; });
  var html = '';
  for (var s = 0; s < sorted.length; s++) {
    var r = sorted[s];
    var cat = getCategoryById(r.categoryId);
    var statusBadge = r.status === 'pending' ? '<span class="badge bamb">Pending</span>' : (r.status === 'approved' ? '<span class="badge bg">Approved</span>' : '<span class="badge brd">Rejected</span>');
    var docKeys = ['birthCert', 'medical', 'registration'];
    var docsSubmitted = [];
    for (var dk = 0; dk < docKeys.length; dk++) { if (r.docs[docKeys[dk]].submitted) docsSubmitted.push(docKeys[dk]); }
    html += '<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
      + '<div><div style="font-weight:600">' + esc(r.teamName) + '</div><div style="font-size:13px;color:var(--tm)">' + (cat ? esc(cat.name) : '(deleted category)') + ' \u00b7 ' + r.players.length + ' players \u00b7 Manager: ' + esc(r.managerName) + ' (' + esc(r.managerEmail) + ')</div></div>'
      + statusBadge + '</div>'
      + '<div style="font-size:13px;color:var(--tm);margin-bottom:8px">Documents: ' + (docsSubmitted.length ? esc(docsSubmitted.join(', ')) : 'none uploaded') + '</div>'
      + '<button class="expand-btn" onclick="toggleExpand(this)"><i class="ti ti-chevron-down"></i> View roster</button><div class="mc-expand">' + regPlayersTable(r) + '</div>'
      + (r.status === 'pending' ? ('<div style="display:flex;gap:8px;margin-top:10px"><button class="btn primary sm" onclick="approveRegistration(\'' + r.id + '\')"><i class="ti ti-check"></i> Approve</button><button class="btn sm danger" onclick="rejectRegistration(\'' + r.id + '\')"><i class="ti ti-x"></i> Reject</button></div>')
        : (r.status === 'rejected' && r.rejectReason ? ('<div style="font-size:13px;color:var(--red);margin-top:6px">Reason: ' + esc(r.rejectReason) + '</div>') : ''))
      + '</div>';
  }
  el('main-content').innerHTML = html;
}
function regPlayersTable(r) {
  var html = '<table class="tbl"><thead><tr><th>Name</th><th>Jersey</th><th>Pos</th><th>Age</th></tr></thead><tbody>';
  for (var i = 0; i < r.players.length; i++) { var p = r.players[i]; html += '<tr><td>' + esc(p.name) + '</td><td>' + esc(p.jersey) + '</td><td>' + esc(p.pos) + '</td><td>' + esc(p.age) + '</td></tr>'; }
  html += '</tbody></table>';
  return html;
}
function approveRegistration(id) {
  var r = null;
  for (var i = 0; i < S.registrations.length; i++) { if (S.registrations[i].id === id) { r = S.registrations[i]; break; } }
  if (!r) return;
  var cat = getCategoryById(r.categoryId);
  if (!cat) { showToast('That category no longer exists'); return; }
  var staff = [];
  if (r.managerName) staff.push({ id: uid(), name: r.managerName, role: 'Team Manager', roleOther: '', phone: r.managerPhone || '' });
  if (r.coachName) staff.push({ id: uid(), name: r.coachName, role: 'Head Coach', roleOther: '', phone: r.coachPhone || '' });
  var newTeam = {
    id: uid(), name: r.teamName, coach: r.coachName, staff: staff,
    players: r.players.map(function (p) { return { id: uid(), name: p.name, jersey: p.jersey || '\u2014', pos: p.pos || '\u2014', age: p.age || '\u2014' }; }),
    docs: {
      birthCert: r.docs.birthCert.submitted ? 'submitted' : 'pending',
      medical: r.docs.medical.submitted ? 'submitted' : 'pending',
      registration: r.docs.registration.submitted ? 'submitted' : 'pending'
    }
  };
  cat.teams.push(newTeam);
  var newUser = defaultUser();
  newUser.name = r.managerName;
  newUser.email = r.managerEmail;
  newUser.role = 'team';
  newUser.assignedTeams = [newTeam.id];
  newUser.activeCategoryAccess = [cat.id];
  S.users.push(newUser);
  r.status = 'approved';
  logAudit('Registration approved', r.teamName + ' \u2014 team & manager account created for ' + r.managerName, null);
  render();
  renderNav();
  showToast('Approved \u2014 team and manager account created');
}
function rejectRegistration(id) {
  var r = null;
  for (var i = 0; i < S.registrations.length; i++) { if (S.registrations[i].id === id) { r = S.registrations[i]; break; } }
  if (!r) return;
  var reason = prompt('Reason for rejection (optional):') || '';
  r.status = 'rejected';
  r.rejectReason = reason;
  logAudit('Registration rejected', r.teamName + (reason ? (' \u2014 ' + reason) : ''), null);
  render();
  showToast('Registration rejected');
}

/* ---------------- DRAW / STANDINGS ---------------- */
function getTeamById(id) {
  for (var i = 0; i < S.teams.length; i++) { if (S.teams[i].id === id) return S.teams[i]; }
  return null;
}
function fairPlayScore(s) { return -(s.yc + (s.rc_ind * 3) + (s.rc_dir * 4) + (s.yrc * 5)); }

function generateDraw() {
  if (S.teams.length < 2) return;
  var t = S.tournament;
  var k = t.structure || 'groups_knockout';
  var shuffled = S.teams.slice();

function calcGroupStandings(gi) {
  var grp = S.groups[gi];
  var stats = {};
  for (var i = 0; i < grp.teamIds.length; i++) {
    var id = grp.teamIds[i];
    stats[id] = { id: id, mp: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, pts: 0, yc: 0, rc_ind: 0, rc_dir: 0, yrc: 0 };
  }
  var played = [];
  for (var m = 0; m < S.groupMatches.length; m++) {
    if (S.groupMatches[m].group === gi && S.groupMatches[m].played) played.push(S.groupMatches[m]);
  }
  for (var pi = 0; pi < played.length; pi++) {
    var mm = played[pi];
    var hh = stats[mm.homeId], aa = stats[mm.awayId];
    if (!hh || !aa) continue;
    if (mm.status === 'default') { hh.w++; hh.pts += 3; hh.gf += 3; hh.mp++; aa.l++; aa.ga += 3; aa.mp++; continue; }
    if (mm.status === 'dq') { hh.w++; hh.pts += 3; hh.mp++; aa.l++; aa.mp++; continue; }
    hh.mp++; aa.mp++; hh.gf += mm.homeScore; hh.ga += mm.awayScore; aa.gf += mm.awayScore; aa.ga += mm.homeScore;
    if (mm.homeScore > mm.awayScore) { hh.w++; hh.pts += 3; aa.l++; }
    else if (mm.homeScore === mm.awayScore) { hh.d++; hh.pts++; aa.d++; aa.pts++; }
    else { aa.w++; aa.pts += 3; hh.l++; }
    for (var e = 0; e < mm.events.length; e++) {
      var ev = mm.events[e];
      var tgt = ev.teamId === mm.homeId ? hh : aa;
      if (ev.type === 'yellow') tgt.yc++;
      else if (ev.type === 'red_indirect') tgt.rc_ind++;
      else if (ev.type === 'red_direct') tgt.rc_dir++;
      else if (ev.type === 'red_yellow') tgt.yrc++;
    }
  }
  var list = [];
  for (var key in stats) { list.push(stats[key]); }

  function h2hFilter(tiedIds) {
    var out = [];
    for (var mi2 = 0; mi2 < S.groupMatches.length; mi2++) {
      var mm2 = S.groupMatches[mi2];
      if (mm2.group !== gi || !mm2.played) continue;
      if (tiedIds.indexOf(mm2.homeId) >= 0 && tiedIds.indexOf(mm2.awayId) >= 0) out.push(mm2);
    }
    return out;
  }

  list.sort(function (a, b) {
    if (b.pts !== a.pts) return b.pts - a.pts;
    var tied = [];
    for (var ti2 = 0; ti2 < list.length; ti2++) { if (list[ti2].pts === a.pts) tied.push(list[ti2]); }
    if (tied.length > 1) {
      var tiedIds = tied.map(function (x) { return x.id; });
      var h2hMatches = h2hFilter(tiedIds);
      function h2pts(x) {
        var p = 0;
        for (var mj = 0; mj < h2hMatches.length; mj++) {
          var mm3 = h2hMatches[mj];
          if (mm3.homeId === x.id) { if (mm3.homeScore > mm3.awayScore) p += 3; else if (mm3.homeScore === mm3.awayScore) p += 1; }
          if (mm3.awayId === x.id) { if (mm3.awayScore > mm3.homeScore) p += 3; else if (mm3.homeScore === mm3.awayScore) p += 1; }
        }
        return p;
      }
      var pa = h2pts(a), pb = h2pts(b);
      if (pb !== pa) return pb - pa;
      function h2gd(x) {
        var gf = 0, ga = 0;
        for (var mk = 0; mk < h2hMatches.length; mk++) {
          var mm4 = h2hMatches[mk];
          if (mm4.homeId === x.id) { gf += mm4.homeScore; ga += mm4.awayScore; }
          if (mm4.awayId === x.id) { gf += mm4.awayScore; ga += mm4.homeScore; }
        }
        return gf - ga;
      }
      var ga2 = h2gd(a), gb2 = h2gd(b);
      if (gb2 !== ga2) return gb2 - ga2;
    }
    if ((b.gf - b.ga) !== (a.gf - a.ga)) return (b.gf - b.ga) - (a.gf - a.ga);
    if (b.gf !== a.gf) return b.gf - a.gf;
    return fairPlayScore(b) - fairPlayScore(a);
  });
  return list;
}

/* ---------------- BRACKET ---------------- */
function buildKnockout() {
  var total = S.groupMatches.length, played = 0;
  for (var i = 0; i < S.groupMatches.length; i++) { if (S.groupMatches[i].played) played++; }
  if (played < total) return null;
  var advancers = getAdvancers();
  if (!advancers.length) return null;
  var rounds = [];
  var current = [];
  for (var ci = 0; ci < advancers.length; ci += 2) {
    if (advancers[ci + 1]) current.push({ id: uid(), p1: advancers[ci], p2: advancers[ci + 1], s1: null, s2: null, played: false, winner: null, ps1: null, ps2: null, events: [] });
  }
  function rn(n) { return n === 1 ? 'Final' : (n === 2 ? 'Semi-finals' : (n === 4 ? 'Quarter-finals' : ('Round of ' + (n * 2)))); }
  rounds.push({ name: rn(current.length), matches: current });
  var prev = current;
  while (prev.length > 1) {
    var next = [];
    for (var ni = 0; ni < prev.length; ni += 2) { next.push({ id: uid(), p1: null, p2: null, s1: null, s2: null, played: false, winner: null, from: [ni, ni + 1], events: [] }); }
    rounds.push({ name: rn(next.length), matches: next });
    prev = next;
  }
  return rounds;
}
function propagateKnockout() {
  for (var ri = 1; ri < S.knockoutRounds.length; ri++) {
    var prev = S.knockoutRounds[ri - 1];
    var cur = S.knockoutRounds[ri];
    for (var mi = 0; mi < cur.matches.length; mi++) {
      var m = cur.matches[mi];
      if (!m.from) continue;
      var w0 = prev.matches[m.from[0]] ? prev.matches[m.from[0]].winner : null;
      var w1 = prev.matches[m.from[1]] ? prev.matches[m.from[1]].winner : null;
      if (w0) m.p1 = { id: w0.id, seed: 'W' + (m.from[0] + 1) };
      if (w1) m.p2 = { id: w1.id, seed: 'W' + (m.from[1] + 1) };
    }
  }
}

function renderBracketChart(rounds) {
  if (!rounds || !rounds.length) return '<p style="padding:20px;color:var(--tm)">No bracket data.</p>';
  var gold = '#c8960a', goldFill = 'rgba(200,150,10,0.14)', textC = '#1a1a1a', muted = '#9aa0a8', nb = '#e6dcc2', navy3 = '#f7f3ea', navy4 = '#ffffff';
  var SW = 130, SH = 28, SGAP = 6, MH = SH * 2 + SGAP, CP = SW + 50, PX = 14, PY = 30, LH = 16;
  var numSide = rounds.length - 1;
  var maxM = rounds[0].matches.length;
  var sP = Math.max(38, 280 / maxM);
  var totS = maxM * 2;
  var totH = PY + LH + totS * sP + PY + 48;
  var totW = PX * 2 + (numSide * 2 + 1) * CP;
  function cX(ci) { return PX + ci * CP; }
  var fX = PX + numSide * CP;
  function rX(ci) { return fX + (ci + 1) * CP; }
  function mY(ri, mi) {
    var f = Math.pow(2, ri);
    var ts = mi * f * 2;
    var bs = ts + f * 2 - 1;
    var cs = (ts + bs) / 2;
    return PY + LH + cs * sP - MH / 2;
  }
  var fY = PY + LH + (totS / 2 - 1) * sP - MH / 2 + sP / 2;
  var s = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + totW + ' ' + totH + '" style="width:100%;display:block;font-family:Inter,system-ui,sans-serif">';
  s += '<rect width="' + totW + '" height="' + totH + '" fill="' + navy4 + '" rx="10"/>';
  function ln(x1, y1, x2, y2) { s += '<line x1="' + Math.round(x1) + '" y1="' + Math.round(y1) + '" x2="' + Math.round(x2) + '" y2="' + Math.round(y2) + '" stroke="' + nb + '" stroke-width="1"/>'; }
  function drawSlot(x, y, team, tid, winner, score, seed, flip) {
    var isW = !!(winner && tid && tid === winner);
    var isL = !!(winner && tid && tid !== winner);
    var fill = isW ? goldFill : navy3, bdr = isW ? gold : nb, nc = isL ? muted : ((team || seed) ? textC : muted);
    var nm = team ? (team.name.length > 15 ? (team.name.slice(0, 14) + '\u2026') : team.name) : (seed || 'TBD');
    var sc = (score !== null && score !== undefined) ? String(score) : '';
    s += '<rect x="' + x + '" y="' + y + '" width="' + SW + '" height="' + SH + '" rx="4" fill="' + fill + '" stroke="' + bdr + '" stroke-width="1"/>';
    if (isW) s += '<rect x="' + (flip ? (x + SW - 3) : x) + '" y="' + y + '" width="3" height="' + SH + '" rx="1" fill="' + gold + '"/>';
    if (flip) {
      s += '<text x="' + (x + SW - 8) + '" y="' + (y + 18) + '" font-size="11" font-weight="' + (isW ? '600' : '400') + '" fill="' + nc + '" text-anchor="end">' + nm + '</text>';
      if (sc) s += '<text x="' + (x + 8) + '" y="' + (y + 18) + '" font-size="12" font-weight="700" fill="' + (isW ? gold : muted) + '" text-anchor="start">' + sc + '</text>';
    } else {
      s += '<text x="' + (x + 8) + '" y="' + (y + 18) + '" font-size="11" font-weight="' + (isW ? '600' : '400') + '" fill="' + nc + '" text-anchor="start">' + nm + '</text>';
      if (sc) s += '<text x="' + (x + SW - 8) + '" y="' + (y + 18) + '" font-size="12" font-weight="700" fill="' + (isW ? gold : muted) + '" text-anchor="end">' + sc + '</text>';
    }
  }
  function drawMatch(x, y, m, flip) {
    var p1 = m.p1 ? getTeamById(m.p1.id) : null, p2 = m.p2 ? getTeamById(m.p2.id) : null, w = m.winner ? m.winner.id : null;
    drawSlot(x, y, p1, m.p1 ? m.p1.id : null, w, m.played ? m.s1 : null, m.p1 ? m.p1.seed : null, flip);
    drawSlot(x, y + SH + SGAP, p2, m.p2 ? m.p2.id : null, w, m.played ? m.s2 : null, m.p2 ? m.p2.seed : null, flip);
    if (m.ps1 !== null && m.ps1 !== undefined && m.played) {
      s += '<rect x="' + x + '" y="' + (y + MH + 2) + '" width="' + SW + '" height="13" rx="3" fill="rgba(124,58,237,0.12)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>';
      s += '<text x="' + (x + SW / 2) + '" y="' + (y + MH + 11) + '" font-size="9" fill="#7c3aed" text-anchor="middle" font-weight="600">PENS ' + m.ps1 + '\u2013' + m.ps2 + '</text>';
    }
  }
  for (var ri = 0; ri < numSide; ri++) {
    var cx = cX(ri), ncx = ri < numSide - 1 ? cX(ri + 1) : fX, midX = cx + SW + (ncx - cx - SW) / 2;
    var matches = rounds[ri].matches;
    for (var mi = 0; mi < matches.length; mi++) {
      var y0 = mY(ri, mi), cy0 = y0 + SH / 2, cy1 = y0 + SH + SGAP + SH / 2;
      ln(cx + SW, cy0, midX, cy0); ln(cx + SW, cy1, midX, cy1); ln(midX, cy0, midX, cy1);
      var nmi = Math.floor(mi / 2), nsl = mi % 2;
      var ny = ri + 1 < numSide ? mY(ri + 1, nmi) : fY;
      var ncy = ny + nsl * (SH + SGAP) + SH / 2;
      ln(midX, (cy0 + cy1) / 2, midX, ncy); ln(midX, ncy, ncx, ncy);
    }
  }
  for (var rj = 0; rj < numSide; rj++) {
    var srcRi = numSide - 1 - rj, rcx = rX(rj), rncx = rj < numSide - 1 ? rX(rj + 1) : (fX + SW), rmidX = rcx - (rcx - rncx) / 2;
    var matches2 = rounds[srcRi].matches;
    for (var mj = 0; mj < matches2.length; mj++) {
      var y02 = mY(srcRi, mj), cy02 = y02 + SH / 2, cy12 = y02 + SH + SGAP + SH / 2;
      ln(rcx, cy02, rmidX, cy02); ln(rcx, cy12, rmidX, cy12); ln(rmidX, cy02, rmidX, cy12);
      var nmi2 = Math.floor(mj / 2), nsl2 = mj % 2;
      var prv = srcRi - 1;
      var ny2 = prv >= 0 ? mY(prv, nmi2) : fY;
      var ncy2 = ny2 + nsl2 * (SH + SGAP) + SH / 2;
      ln(rmidX, (cy02 + cy12) / 2, rmidX, ncy2); ln(rmidX, ncy2, rncx, ncy2);
    }
  }
  for (var li = 0; li < numSide; li++) {
    var lcx = cX(li);
    s += '<text x="' + (lcx + SW / 2) + '" y="' + (PY + LH - 3) + '" font-size="9" font-weight="600" fill="' + muted + '" text-anchor="middle" letter-spacing="0.07em">' + rounds[li].name.toUpperCase() + '</text>';
    var lm = rounds[li].matches;
    for (var lmi = 0; lmi < lm.length; lmi++) { drawMatch(cX(li), mY(li, lmi), lm[lmi], false); }
  }
  for (var rk = 0; rk < numSide; rk++) {
    var srcR2 = numSide - 1 - rk, rcx2 = rX(rk);
    s += '<text x="' + (rcx2 + SW / 2) + '" y="' + (PY + LH - 3) + '" font-size="9" font-weight="600" fill="' + muted + '" text-anchor="middle" letter-spacing="0.07em">' + rounds[srcR2].name.toUpperCase() + '</text>';
    var rm = rounds[srcR2].matches;
    for (var rmi = 0; rmi < rm.length; rmi++) { drawMatch(rX(rk), mY(srcR2, rmi), rm[rmi], true); }
  }
  s += '<text x="' + (fX + SW / 2) + '" y="' + (PY + LH - 3) + '" font-size="9" font-weight="600" fill="' + gold + '" text-anchor="middle" letter-spacing="0.07em">FINAL</text>';
  drawMatch(fX, fY, rounds[rounds.length - 1].matches[0], false);
  var tY = fY + MH + 14;
  s += '<text x="' + (fX + SW / 2) + '" y="' + (tY + 16) + '" font-size="20" text-anchor="middle">\u{1F3C6}</text>';
  var lastM = rounds[rounds.length - 1].matches[0];
  var champ = lastM.winner ? getTeamById(lastM.winner.id) : null;
  if (champ) {
    s += '<rect x="' + fX + '" y="' + (tY + 22) + '" width="' + SW + '" height="20" rx="4" fill="' + goldFill + '" stroke="' + gold + '" stroke-width="1"/>';
    s += '<text x="' + (fX + SW / 2) + '" y="' + (tY + 35) + '" font-size="10" font-weight="600" fill="' + gold + '" text-anchor="middle">' + champ.name + '</text>';
  }
  s += '</svg>';
  return s;
}

function saveKoScore(ri, mi) {

/* Full team records (with players/coach/docs) across every category, each
   tagged with its category. Used to scope a Team Manager's view to only
   the teams assigned to their user account. */
function getFullTeamsAcrossCategories() {
  var out = [];
  for (var c = 0; c < S.categories.length; c++) {
    var cat = S.categories[c];
    for (var t = 0; t < cat.teams.length; t++) {
      out.push({ team: cat.teams[t], categoryId: cat.id, categoryName: cat.name });

}
function getMyTeamRecords() {
  var u = S.activeUserId ? getUserById(S.activeUserId) : null;

  return out;
}
function setActiveTeamManager(userId) {

/* Shared by the Team Manager dashboard and the public Team Profile view.
   Assumes S.activeCategoryId already points at the team's category (both
   call sites guarantee this before calling). */
function computeTeamStats(tm) {
  var cat = activeCategory();
  var myMatches = [];
  for (var i = 0; i < cat.groupMatches.length; i++) { var mm = cat.groupMatches[i]; if (mm.homeId === tm.id || mm.awayId === tm.id) myMatches.push(mm); }
  var next = null, prev = [];
  for (var n = 0; n < myMatches.length; n++) { if (!myMatches[n].played) { if (!next) next = myMatches[n]; } else { prev.push(myMatches[n]); } }
  var groupIdx = -1;
  for (var g = 0; g < cat.groups.length; g++) { if (cat.groups[g].teamIds.indexOf(tm.id) >= 0) { groupIdx = g; break; } }
  var rankLabel = 'Not yet drawn';
  if (groupIdx >= 0) {
    var standings = calcGroupStandings(groupIdx);
    for (var s = 0; s < standings.length; s++) { if (standings[s].id === tm.id) { rankLabel = '#' + (s + 1) + ' of ' + standings.length + ' in Group ' + cat.groups[groupIdx].name + ' (' + standings[s].pts + ' pts)'; break; } }
  }
  var goals = 0, yellow = 0, red = 0;
  for (var pm = 0; pm < myMatches.length; pm++) {
    var evs = myMatches[pm].events || [];
    for (var e = 0; e < evs.length; e++) {
      if (evs[e].teamId !== tm.id) continue;
      if (evs[e].type === 'goal' || evs[e].type === 'penalty_goal') goals++;
      else if (evs[e].type === 'yellow') yellow++;
      else if (evs[e].type === 'red_direct' || evs[e].type === 'red_indirect' || evs[e].type === 'red_yellow') red++;
    }
  }
  return { next: next, prev: prev, rankLabel: rankLabel, goals: goals, yellow: yellow, red: red, groupIdx: groupIdx };
}

var DOC_UPLOAD_TYPES = { birthCert: 'Birth Certificate', nationalId: 'National ID (in lieu of Birth Cert)', medical: 'Medical Clearance', other: 'Other' };
/* Team-level completion: birth cert + registration are required on the
   fixed checklist (medical stays optional there); status also reflects
   whether any per-player uploads are still awaiting review. */
function computeTeamDocStatus(tm) {
  var dcs = tm.docs || {};
  var requiredKeys = ['birthCert', 'registration'];
  var submittedRequired = 0;
  for (var i = 0; i < requiredKeys.length; i++) { if (dcs[requiredKeys[i]] === 'submitted') submittedRequired++; }
  var uploads = tm.documents || [];
  var pendingUploads = 0;
  for (var j = 0; j < uploads.length; j++) { if (uploads[j].status === 'pending') pendingUploads++; }
  var status, label;
  if (submittedRequired < requiredKeys.length) { status = 'incomplete'; label = 'Incomplete'; }
  else if (pendingUploads > 0) { status = 'pending'; label = 'Pending Review'; }
  else { status = 'completed'; label = 'Completed'; }
  return { status: status, label: label, submittedRequired: submittedRequired, requiredTotal: requiredKeys.length, pendingUploads: pendingUploads };
}
function docStatusBadgeHtml(tm) {
  var st = computeTeamDocStatus(tm);
  var cls = st.status === 'completed' ? 'bgr' : (st.status === 'pending' ? 'bamb' : 'brd');
  var icon = st.status === 'completed' ? '\u2713' : (st.status === 'pending' ? '\u23f3' : '\u26a0');
  return '<span class="badge ' + cls + '" title="' + st.submittedRequired + '/' + st.requiredTotal + ' required documents submitted' + (st.pendingUploads ? (', ' + st.pendingUploads + ' upload(s) pending review') : '') + '">' + icon + ' Docs: ' + st.label + '</span>';
}
/* Which required per-player documents (birth cert/national ID, medical) a
   player is missing entirely vs. still has pending review, based on the
   type+player-scoped uploads on the team. */
function getPlayerDocFlags(tm, player) {
  var uploads = tm.documents || [];
  var hasBirth = false, hasBirthPending = false, hasMedical = false, hasMedicalPending = false;
  for (var i = 0; i < uploads.length; i++) {
    var d = uploads[i];
    if (d.playerId !== player.id) continue;
    if (d.type === 'birthCert' || d.type === 'nationalId') {
      if (d.status === 'approved') hasBirth = true; else if (d.status !== 'rejected') hasBirthPending = true;
    }
    if (d.type === 'medical') {
      if (d.status === 'approved') hasMedical = true; else if (d.status !== 'rejected') hasMedicalPending = true;
    }
  }
  var missing = [];
  if (!hasBirth && !hasBirthPending) missing.push('Birth cert/ID');
  if (!hasMedical && !hasMedicalPending) missing.push('Medical');
  var pending = [];
  if (hasBirthPending) pending.push('Birth cert/ID');
  if (hasMedicalPending) pending.push('Medical');
  return { missing: missing, pending: pending };
}

/* Once a match is played (via End Match or a manual score override), it
